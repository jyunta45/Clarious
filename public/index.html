<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clarious</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Clarious"/>
<meta name="theme-color" content="#0d0d14"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0d14;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.12);--accent:#9b6dff;--accent2:#ff6db5;--gold:#f5c842;--text:#f0eaff;--muted:#9985c0;--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 20%,rgba(155,109,255,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,109,181,0.1) 0%,transparent 60%);}
.page{max-width:780px;margin:0 auto;padding:40px 20px;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:52px;width:100%;}
.brand{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:700;text-align:center;background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
.brand-gold{background:linear-gradient(135deg,#f5d87a 0%,#c9a840 50%,#f0c04a 100%) !important;-webkit-background-clip:text !important;-webkit-text-fill-color:transparent !important;background-clip:text !important;}
.tagline{text-align:center;color:var(--muted);font-size:1.1rem;margin-bottom:40px;}
.meta-list{background:rgba(155,109,255,0.1);border:1px solid rgba(155,109,255,0.2);border-radius:var(--radius);padding:28px;margin-bottom:36px;}
.meta-list p{color:var(--muted);line-height:2;font-size:0.95rem;}
.meta-list strong{color:var(--text);}
.btn-primary{width:100%;padding:18px;font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:0.5px;transition:opacity 0.2s,transform 0.15s;}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.sec-badge{display:inline-block;background:rgba(245,200,66,0.15);border:1px solid rgba(245,200,66,0.3);color:var(--gold);font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;padding:5px 14px;border-radius:100px;margin-bottom:18px;}
.prog-row{display:flex;justify-content:space-between;font-size:0.85rem;color:var(--muted);margin-bottom:8px;}
.prog-track{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:10px;margin-bottom:32px;}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.3s;}
.question-text{font-size:1.35rem;font-weight:600;line-height:1.5;margin-bottom:8px;}
.hint-text{color:var(--muted);font-size:0.9rem;margin-bottom:24px;}
.field-text,.field-area{width:100%;padding:16px;font-family:'DM Sans',sans-serif;font-size:1rem;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;margin-bottom:20px;}
.field-area{min-height:120px;resize:vertical;}
.field-text:focus,.field-area:focus{border-color:var(--accent);}
.opt-btn{display:block;width:100%;text-align:left;padding:16px 20px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;cursor:pointer;margin-bottom:10px;transition:all 0.15s;}
.opt-btn:hover{background:rgba(155,109,255,0.15);border-color:var(--accent);}
.check-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;}
.check-row:hover{background:rgba(155,109,255,0.1);}
.check-row.checked{background:rgba(155,109,255,0.15);border-color:var(--accent);}
.check-box{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);flex-shrink:0;}
.check-row.checked .check-box{border-color:var(--accent);}
.field-range{width:100%;margin:12px 0;accent-color:var(--accent);}
.slider-num{text-align:center;font-size:2rem;font-weight:700;color:var(--accent);}
.range-labels{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--muted);margin-bottom:20px;}
.btn-row{display:flex;gap:12px;margin-top:16px;}
.btn-back{padding:16px 28px;font-family:'DM Sans',sans-serif;font-size:1rem;background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);cursor:pointer;}
.btn-skip{padding:16px 28px;font-family:'DM Sans',sans-serif;font-size:1rem;background:transparent;border:1px dashed var(--border);border-radius:var(--radius);color:var(--muted);cursor:pointer;transition:opacity 0.2s;}.btn-skip:hover{opacity:0.7;}
.reset-link{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--muted);cursor:pointer;}
.reset-link:hover{color:var(--accent2);}
.mirror-box{white-space:pre-wrap;background:rgba(155,109,255,0.08);border:1px solid rgba(155,109,255,0.2);border-radius:var(--radius);padding:28px;margin:24px 0;font-size:0.95rem;line-height:1.8;color:var(--muted);}
.chat-wrap{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden;}
.chat-header{padding:16px 20px;background:rgba(13,13,20,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;}
.msg.user{justify-content:flex-end;}
.bubble{max-width:80%;padding:14px 20px;border-radius:20px;font-size:0.95rem;line-height:1.6;white-space:pre-wrap;}
.bubble.assistant{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:6px;}
.bubble.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-bottom-right-radius:6px;}
.chat-input-bar{padding:16px 20px;background:rgba(13,13,20,0.95);border-top:1px solid var(--border);}
.chat-input-inner{display:flex;gap:10px;}
.chat-input{flex:1;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:1rem;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;}
.chat-input:focus{border-color:var(--accent);}
.chat-send{padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:var(--radius);cursor:pointer;}
.lang-picker{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:28px;}
.lang-btn{padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:1rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);cursor:pointer;transition:all 0.15s;min-width:140px;text-align:center;}
.lang-btn:hover{background:rgba(155,109,255,0.15);border-color:var(--accent);}
.lang-btn.active{background:rgba(155,109,255,0.2);border-color:var(--accent);color:#fff;}
.lang-switcher{position:fixed;top:12px;right:12px;z-index:100;display:flex;gap:6px;background:rgba(13,13,20,0.9);border:1px solid var(--border);border-radius:12px;padding:6px;}
.lang-mini{padding:6px 10px;font-size:0.75rem;background:none;border:1px solid transparent;border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;}
.lang-mini:hover{color:var(--text);}
.lang-mini.active{background:rgba(155,109,255,0.2);border-color:var(--accent);color:#fff;}
.auth-form{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.auth-form input{width:100%;padding:16px;font-family:'DM Sans',sans-serif;font-size:1rem;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;}
.auth-form input:focus{border-color:var(--accent);}
.auth-toggle{text-align:center;color:var(--muted);font-size:0.9rem;margin-top:12px;}
.auth-toggle span{color:var(--accent);cursor:pointer;}
.auth-toggle span:hover{text-decoration:underline;}
.auth-error{background:rgba(255,80,80,0.15);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;padding:12px 16px;border-radius:12px;font-size:0.9rem;text-align:center;}
.auth-success{background:rgba(80,255,120,0.15);border:1px solid rgba(80,255,120,0.3);color:#6bffaa;padding:12px 16px;border-radius:12px;font-size:0.9rem;text-align:center;}
.forgot-link{text-align:center;color:var(--accent);font-size:0.85rem;cursor:pointer;margin-top:4px;}
.forgot-link:hover{text-decoration:underline;}
.reset-code-display{background:rgba(155,109,255,0.15);border:1px solid rgba(155,109,255,0.3);color:var(--accent);padding:16px;border-radius:12px;text-align:center;font-size:1.3rem;font-weight:700;letter-spacing:4px;margin:12px 0;}
.auth-info{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--muted);}
.auth-info .email{color:var(--accent);font-weight:500;}
.auth-info .logout-btn{color:var(--muted);cursor:pointer;font-size:0.8rem;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;}
.auth-info .logout-btn:hover{color:var(--accent2);}
.guest-link{text-align:center;color:var(--muted);font-size:0.85rem;margin-top:8px;cursor:pointer;}
.guest-link:hover{color:var(--accent);}
.guidance-nudge{padding:4px 20px 10px;text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.5);font-style:italic;font-family:'DM Sans',sans-serif;}
.response-nudge{padding:4px 0 0 4px;font-size:0.78rem;color:rgba(255,200,100,0.65);font-style:italic;font-family:'DM Sans',sans-serif;}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 12px;justify-content:center;}
.quick-btn{padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:0.82rem;background:rgba(155,109,255,0.1);border:1px solid rgba(155,109,255,0.25);border-radius:100px;color:var(--accent);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.quick-btn:hover{background:rgba(155,109,255,0.2);border-color:var(--accent);transform:translateY(-1px);}
.mode-tabs{position:relative;display:flex;gap:0;background:rgba(13,13,20,0.6);border-bottom:1px solid var(--border);padding:0;}
.mode-tab{flex:1;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all 0.3s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mode-tab:hover{color:var(--text);background:rgba(155,109,255,0.05);}
.mode-tab.active{color:#fff;border-bottom-color:var(--accent);background:rgba(155,109,255,0.08);}
.mode-tab .mode-label{font-size:0.9rem;font-weight:600;}
.mode-tab .mode-sub{font-size:0.65rem;font-weight:400;opacity:0.6;}
.mode-tab.active .mode-sub{opacity:0.8;}
.mode-tab[data-mode="deep"].active{border-bottom-color:#7c5cbf;background:rgba(90,60,160,0.12);}
.chat-wrap.mode-deep .chat-messages{background:radial-gradient(ellipse at 50% 0%,rgba(90,60,160,0.12) 0%,transparent 55%),radial-gradient(ellipse at 20% 80%,rgba(60,40,120,0.08) 0%,transparent 50%);transition:background 0.5s ease;}
.chat-wrap.mode-deep .bubble.assistant{background:rgba(90,60,160,0.12);border:1px solid rgba(120,90,200,0.2);box-shadow:0 0 20px rgba(90,60,160,0.08),0 2px 8px rgba(0,0,0,0.15);border-bottom-left-radius:6px;}
.chat-wrap.mode-deep .bubble.user{background:linear-gradient(135deg,#7c5cbf,#9b6dff);box-shadow:0 2px 12px rgba(120,90,200,0.25);}
.chat-wrap.mode-deep .chat-header{background:rgba(8,6,18,0.97);border-bottom-color:rgba(120,90,200,0.15);}
.chat-wrap.mode-deep .mode-tabs{background:rgba(8,6,18,0.7);border-bottom-color:rgba(120,90,200,0.15);}
.chat-wrap.mode-deep .chat-input-bar{background:rgba(8,6,18,0.97);border-top-color:rgba(120,90,200,0.15);}
.chat-wrap.mode-deep .chat-input{background:rgba(90,60,160,0.08);border-color:rgba(120,90,200,0.2);}
.chat-wrap.mode-deep .chat-input:focus{border-color:#7c5cbf;box-shadow:0 0 12px rgba(90,60,160,0.15);}
.chat-wrap.mode-deep .chat-send{background:linear-gradient(135deg,#6b4db0,#8b6bdf);box-shadow:0 2px 10px rgba(90,60,160,0.3);}
.chat-wrap.mode-daily .chat-messages{transition:background 0.5s ease;}
.mode-shift-chips{display:flex;gap:8px;padding:8px 20px;justify-content:center;}
.mode-shift-chip{padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:0.82rem;border-radius:100px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.mode-shift-chip.switch{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;}
.mode-shift-chip.switch:hover{opacity:0.9;transform:translateY(-1px);}
.mode-shift-chip.stay{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);}
.mode-shift-chip.stay:hover{color:var(--text);border-color:rgba(155,109,255,0.3);}
.checkin-banner{padding:16px 20px;background:linear-gradient(135deg,rgba(155,109,255,0.15),rgba(255,109,181,0.1));border-bottom:1px solid rgba(155,109,255,0.2);text-align:center;font-size:0.9rem;color:var(--text);cursor:pointer;transition:opacity 0.2s;}
.checkin-banner:hover{opacity:0.85;}
.checkin-dismiss{background:none;border:none;color:var(--muted);font-size:0.75rem;cursor:pointer;margin-left:8px;font-family:'DM Sans',sans-serif;}
.voice-mic{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.voice-mic:hover{background:rgba(155,109,255,0.15);border-color:var(--accent);color:var(--accent);}
.voice-mic.recording{background:rgba(255,80,80,0.2);border-color:#ff5050;color:#ff5050;animation:pulse-mic 1s infinite;}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,0.3);}50%{box-shadow:0 0 0 8px rgba(255,80,80,0);}}
.voice-play{background:none;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;padding:4px 8px;margin-top:4px;display:inline-flex;align-items:center;gap:4px;border-radius:8px;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.voice-play:hover{color:var(--accent);background:rgba(155,109,255,0.1);}
.voice-play.speaking{color:var(--accent2);}
.tier-badge{font-size:0.65rem;padding:2px 8px;border-radius:100px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.tier-guest{background:rgba(255,255,255,0.08);color:var(--muted);}
.tier-free{background:rgba(155,109,255,0.15);color:var(--accent);}
.tier-subscriber{background:linear-gradient(135deg,rgba(245,200,66,0.2),rgba(255,109,181,0.2));color:var(--gold);}
.tier-partner{background:linear-gradient(135deg,rgba(245,200,66,0.2),rgba(255,109,181,0.2));color:var(--gold);}
.msg-limit{text-align:center;padding:6px;font-size:0.7rem;color:var(--muted);}
.patterns-btn{background:rgba(155,109,255,0.12);border:1px solid rgba(155,109,255,0.3);color:var(--accent);font-size:0.72rem;padding:4px 10px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;white-space:nowrap;}
.patterns-btn:hover{background:rgba(155,109,255,0.25);border-color:var(--accent);}
.patterns-panel{position:absolute;top:0;right:0;width:340px;max-width:90vw;height:100%;background:rgba(13,13,20,0.98);border-left:1px solid var(--border);overflow-y:auto;z-index:100;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.patterns-header{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 12px;border-bottom:1px solid var(--border);}
.patterns-title{font-family:Georgia,serif;font-size:1.2rem;color:#fff;}
.patterns-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all 0.15s;}
.patterns-close:hover{color:#fff;background:rgba(255,255,255,0.08);}
.patterns-section{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.04);}
.patterns-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;font-weight:600;}
.patterns-empty{font-size:0.82rem;color:var(--muted);font-style:italic;padding:6px 0;}
.pattern-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pattern-bar-label{font-size:0.78rem;color:var(--text);width:85px;text-transform:capitalize;flex-shrink:0;}
.pattern-bar-track{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.pattern-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.3s;}
.pattern-bar-count{font-size:0.7rem;color:var(--muted);width:28px;text-align:right;flex-shrink:0;}
.mood-trend-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:0.88rem;color:var(--text);}
.mood-trend-text{font-weight:500;}
.mood-indicator{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-weight:700;font-size:0.85rem;}
.mood-pos{background:rgba(167,139,250,0.2);color:#a78bfa;}
.mood-neg{background:rgba(248,113,113,0.2);color:#f87171;}
.mood-neu{background:rgba(107,114,128,0.2);color:#9ca3af;}
.mood-chart{display:flex;gap:3px;align-items:flex-end;height:40px;padding:2px 0;}
.mood-bar{width:14px;border-radius:3px;transition:all 0.2s;cursor:pointer;min-height:4px;}
.mood-bar:hover{opacity:0.8;transform:scaleY(1.2);}
.mood-time-insight{font-size:0.82rem;color:var(--accent2);margin-top:8px;padding:6px 8px;background:rgba(255,109,181,0.06);border-radius:8px;border-left:2px solid rgba(255,109,181,0.3);}
.activity-peak{font-size:0.85rem;color:var(--text);margin-bottom:10px;}
.activity-heatmap{display:flex;gap:2px;flex-wrap:wrap;padding-bottom:18px;}
.heatmap-cell{width:22px;height:22px;background:var(--accent);border-radius:3px;position:relative;cursor:pointer;transition:all 0.15s;}
.heatmap-cell:hover{transform:scale(1.15);}
.heatmap-label{position:absolute;bottom:-14px;left:0;font-size:0.55rem;color:var(--muted);white-space:nowrap;}
.goal-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:8px;}
.goal-text{font-size:0.82rem;color:var(--text);flex:1;}
.goal-meta{font-size:0.68rem;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.challenge-row{margin-bottom:8px;padding:6px 8px;background:rgba(248,113,113,0.06);border-radius:8px;border-left:2px solid rgba(248,113,113,0.3);}
.habit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;transition:background 0.15s;}
.habit-row.habit-done-row{background:rgba(167,139,250,0.08);border-left:2px solid rgba(167,139,250,0.4);}
.habit-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--muted);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:transparent;transition:all 0.15s;flex-shrink:0;}
.habit-check.checked{background:var(--accent);border-color:var(--accent);color:#fff;}
.habit-info{flex:1;min-width:0;}
.habit-name{font-size:0.88rem;color:var(--text);font-weight:500;}
.habit-meta{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.habit-streak-badge{font-size:0.7rem;color:var(--accent);background:rgba(155,109,255,0.12);padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;}

var VOICE_LANGS = { en: 'en-US', ja: 'ja-JP', es: 'es-ES', th: 'th-TH', ko: 'ko-KR' };
var TIER_LIMITS = { guest: 10, free: 50, subscriber: 200 };

function hasVoiceInput() {
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

function hasVoiceOutput() {
  return !!window.speechSynthesis;
}

function startVoiceInput() {
  if (voiceIsRecording) { stopVoiceInput(); return; }
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert(ui('voiceNotSupported')); return; }
  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = VOICE_LANGS[ST.lang || 'en'] || 'en-US';
  voiceRecognition.interimResults = true;
  voiceRecognition.continuous = false;
  voiceRecognition.maxAlternatives = 1;
  voiceIsRecording = true;
  var ci = document.getElementById('ci');
  var micBtn = document.getElementById('voice-mic');
  if (micBtn) micBtn.classList.add('recording');
  if (ci) ci.placeholder = ui('voiceListening');
  var finalTranscript = '';
  voiceRecognition.onresult = function(e) {
    var interim = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) { finalTranscript += e.results[i][0].transcript; }
      else { interim += e.results[i][0].transcript; }
    }
    if (ci) ci.value = finalTranscript + interim;
  };
  voiceRecognition.onend = function() {
    voiceIsRecording = false;
    if (micBtn) micBtn.classList.remove('recording');
    if (ci) ci.placeholder = ui('askAnything');
    if (finalTranscript.trim()) {
      ci.value = finalTranscript.trim();
      ST.autoSpeak = true;
    }
  };
  voiceRecognition.onerror = function() {
    voiceIsRecording = false;
    if (micBtn) micBtn.classList.remove('recording');
    if (ci) ci.placeholder = ui('askAnything');
  };
  voiceRecognition.start();
}

function stopVoiceInput() {
  voiceIsRecording = false;
  if (voiceRecognition) { try { voiceRecognition.stop(); } catch(e) {} }
  var micBtn = document.getElementById('voice-mic');
  if (micBtn) micBtn.classList.remove('recording');
}

function speakText(text, btnEl) {
  if (!window.speechSynthesis) return;
  if (currentSpeech) { window.speechSynthesis.cancel(); currentSpeech = null; }
  if (btnEl && btnEl.classList && btnEl.classList.contains('speaking')) { btnEl.classList.remove('speaking'); btnEl.textContent = ui('voicePlay'); return; }
  document.querySelectorAll('.voice-play.speaking').forEach(function(el) { el.classList.remove('speaking'); el.textContent = ui('voicePlay'); });
  var utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = VOICE_LANGS[ST.lang || 'en'] || 'en-US';
  utterance.rate = 0.95;
  utterance.pitch = 1;
  currentSpeech = utterance;
  if (btnEl) { btnEl.classList.add('speaking'); btnEl.textContent = ui('voiceStop'); }
  utterance.onend = function() { currentSpeech = null; if (btnEl) { try { btnEl.classList.remove('speaking'); btnEl.textContent = ui('voicePlay'); } catch(e){} } };
  utterance.onerror = function() { currentSpeech = null; if (btnEl) { try { btnEl.classList.remove('speaking'); btnEl.textContent = ui('voicePlay'); } catch(e){} } };
  window.speechSynthesis.speak(utterance);
}

function save() {
  try { localStorage.setItem('la', JSON.stringify(ST)); } catch(e) {}
  if (AUTH.loggedIn) {
    if (savePending) clearTimeout(savePending);
    savePending = setTimeout(function() {
      fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          answers: ST.ans,
          messages: ST.threads && ST.threads.length > 0 ? ST.threads : ST.msgs,
          stage: ST.stage,
          step: ST.step,
          lang: ST.lang || 'en',
          mirror: ST.mirror || '',
          identity_profile: ST.identityProfile || {},
          memories: ST.memories || [],
          mood_log: ST.moodLog || [],
          thread_summaries: ST.threadSummaries || {},
          last_active_date: ST.lastActiveDate || '',
          patterns: ST.patterns || { topics: {}, recurringChallenges: [], activityLog: [], goalProgress: [], weeklyTopics: {} },
          onboarding_complete: ST.onboardingComplete || false,
          onboarding_progress: ST.onboardingProgress || {},
          deep_session_id: ST.deepSessionId || 0,
          deep_session_summaries: ST.deepSessionSummaries || []
        })
      }).catch(function(){});
    }, 500);
  }
}

function load() {
  try {
    var d = localStorage.getItem('la');
    if (d) ST = JSON.parse(d);
    if (!ST.lang) ST.lang = '';
  } catch(e) {}
  // Always reset transient in-flight flags — they must never survive a page reload
  ST.loading = false;
  ST.streaming = false;
  ST.limitReached = false;
  try {
    localStorage.removeItem('loading');
    localStorage.removeItem('streaming');
    localStorage.removeItem('limitReached');
  } catch(e) {}
}

async function checkAuth() {
  try {
    var res = await fetch('/api/auth/me');
    var data = await res.json();
    AUTH.checked = true;
    if (data.loggedIn) {
      AUTH.loggedIn = true;
      AUTH.email = data.email;
      AUTH.tier = data.tier || 'free';
      await loadServerData();
    }
  } catch(e) {
    AUTH.checked = true;
  }
  render();
}

async function loadServerData() {
  try {
    var res = await fetch('/api/data');
    var data = await res.json();
    if (data && data.id) {
      if (data.answers && Object.keys(data.answers).length > 0) ST.ans = data.answers;
      if (data.messages) {
        if (Array.isArray(data.messages) && data.messages.length > 0) {
          if (data.messages[0].name !== undefined) {
            ST.threads = data.messages;
            ST.activeThread = ST.activeThread || 0;
            if (ST.threads[ST.activeThread]) ST.msgs = ST.threads[ST.activeThread].msgs;
          } else {
            ST.msgs = data.messages;
          }
        }
      }
      if (data.stage) ST.stage = data.stage;
      if (data.step) ST.step = parseInt(data.step) || 0;
      if (data.lang) ST.lang = data.lang;
      if (data.mirror) ST.mirror = data.mirror;
      if (data.lastCheckin) ST.lastCheckin = data.lastCheckin;
      if (data.identityProfile) ST.identityProfile = data.identityProfile;
      if (data.memories) ST.memories = data.memories;
      if (data.moodLog) ST.moodLog = data.moodLog;
      if (data.threadSummaries) ST.threadSummaries = data.threadSummaries;
      if (data.lastActiveDate) ST.lastActiveDate = data.lastActiveDate;
      if (data.patterns) ST.patterns = data.patterns;
      // Onboarding fields
      if (data.onboardingComplete !== undefined) {
        ST.onboardingComplete = data.onboardingComplete;
      } else if (data.stage === 'chat' || (data.answers && Object.keys(data.answers).length > 0)) {

function compressContext(msgs) {
  var isCJK = ST.lang === 'th' || ST.lang === 'ja' || ST.lang === 'ko';
  var maxMsgs = isCJK ? 8 : 16;
  var recentKeep = isCJK ? 6 : 12;
  if (msgs.length <= maxMsgs) return msgs;
  var oldMsgs = msgs.slice(0, msgs.length - recentKeep);
  var recentMsgs = msgs.slice(msgs.length - recentKeep);
  var summary = 'CONVERSATION SUMMARY: ';
  var topics = [];
  for (var i = 0; i < oldMsgs.length; i++) {
    if (oldMsgs[i].role === 'user' && oldMsgs[i].content.length > 10) {
      var snippet = oldMsgs[i].content.substring(0, 60);
      topics.push(snippet);
    }
  }
  if (topics.length > 0) {
    summary += 'Earlier topics discussed: ' + topics.slice(-5).join('; ') + '. ';
  }
  if (!ST.threadSummaries) ST.threadSummaries = {};
  var threadId = ST.activeThread || 0;
  var prevSummary = ST.threadSummaries[threadId] || '';
  ST.threadSummaries[threadId] = (prevSummary ? prevSummary + ' | ' : '') + topics.slice(-5).join('; ');
  summary += '(' + oldMsgs.length + ' older messages compressed)';
  return [{ role: 'user', content: summary }, { role: 'assistant', content: 'Understood, I have context from our earlier conversation.' }].concat(recentMsgs);
}

function scoreMood(text) {
  var pos = /happy|great|good|amazing|wonderful|excited|love|proud|grateful|thank|confident|progress|better|awesome|fantastic/i;
  var neg = /sad|angry|frustrated|tired|stressed|anxious|worried|scared|lost|stuck|confused|overwhelmed|hate|bad|terrible|hopeless|depressed|exhausted/i;
  var posMatch = (text.match(pos) || []).length;
  var negMatch = (text.match(neg) || []).length;
  if (negMatch > posMatch) return -1;
  if (posMatch > negMatch) return 1;
  return 0;
}

function trackMood(userText) {
  var score = scoreMood(userText);
  if (score === 0) return;
  var today = new Date().toISOString().slice(0, 10);
  var hour = new Date().getHours();
  if (!ST.moodLog) ST.moodLog = [];
  var existing = ST.moodLog.find(function(m) { return m.date === today; });
  if (existing) {
    existing.score = Math.round((existing.score + score) / 2);
    existing.hour = hour;
  } else {
    ST.moodLog.push({ date: today, score: score, note: userText.substring(0, 60), hour: hour });
  }
  if (ST.moodLog.length > 30) ST.moodLog = ST.moodLog.slice(-30);
}

function getMoodTrend() {
  if (!ST.moodLog || ST.moodLog.length < 3) return null;
  var recent = ST.moodLog.slice(-5);
  var avg = recent.reduce(function(s, m) { return s + m.score; }, 0) / recent.length;
  if (avg <= -0.6) return 'declining';
  if (avg >= 0.6) return 'positive';
  return 'stable';
}

function extractMemories(userText, aiText) {
  if (!ST.memories) ST.memories = [];
  var patterns = [
    { re: /(?:my goal|i want to|i plan to|i'm going to|i will|i need to)\s+(.{10,80})/i, tag: 'goal' },
    { re: /(?:i decided|i chose|i'm choosing|decision|i'll go with)\s+(.{10,80})/i, tag: 'decision' },
    { re: /(?:i feel|i'm feeling|i am feeling)\s+(.{10,60})/i, tag: 'emotion' },
    { re: /(?:i started|i began|i'm starting|i launched|i created)\s+(.{10,80})/i, tag: 'milestone' },
    { re: /(?:i struggle with|my problem is|i can't|i'm stuck on|i keep)\s+(.{10,80})/i, tag: 'challenge' },
    { re: /(?:i learned|i realized|insight|i discovered|i found out)\s+(.{10,80})/i, tag: 'insight' }
  ];
  var today = new Date().toISOString().slice(0, 10);
  for (var i = 0; i < patterns.length; i++) {
    var match = userText.match(patterns[i].re);
    if (match) {
      var fact = match[0].substring(0, 120);
      var isDuplicate = ST.memories.some(function(m) { return m.fact === fact; });
      if (!isDuplicate) {
        ST.memories.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), fact: fact, tags: [patterns[i].tag], date: today, source: 'chat' });
      }
    }
  }
  if (ST.memories.length > 100) ST.memories = ST.memories.slice(-100);
}

function retrieveRelevantMemories(userText) {
  if (!ST.memories || ST.memories.length === 0) return '';
  var words = userText.toLowerCase().split(/\s+/).filter(function(w) { return w.length > 3; });
  var scored = ST.memories.map(function(m) {
    var s = 0;
    var factLower = m.fact.toLowerCase();
    for (var i = 0; i < words.length; i++) {
      if (factLower.indexOf(words[i]) >= 0) s += 2;
    }
    for (var j = 0; j < m.tags.length; j++) {
      if (userText.toLowerCase().indexOf(m.tags[j]) >= 0) s += 3;
    }
    return { memory: m, score: s };
  }).filter(function(x) { return x.score > 0; }).sort(function(a, b) { return b.score - a.score; }).slice(0, 3);
  if (scored.length === 0) return '';
  var lines = scored.map(function(x) { return '- [' + x.memory.date + '] ' + x.memory.fact + ' (tags: ' + x.memory.tags.join(', ') + ')'; });
  return '\n\nRELEVANT MEMORIES FROM PAST CONVERSATIONS:\n' + lines.join('\n');
}

  var challenges = ST.patterns && ST.patterns.recurringChallenges ? ST.patterns.recurringChallenges : [];

      if (goalMemories.length > 0) {
        var lastGoalDate = goalMemories[goalMemories.length - 1].date;
        var daysSinceGoal = Math.floor((new Date(today) - new Date(lastGoalDate)) / (1000 * 60 * 60 * 24));
        if (daysSinceGoal >= 7) triggers.push({ type: 'goal_followup', msg: 'It has been ' + daysSinceGoal + ' days since user last discussed goals. If relevant, ask about progress on: ' + goal });
      }
    }

  var habitComp = getHabitCompletionToday();

};

function trackPatterns(userText) {
  if (!ST.patterns) ST.patterns = {};
  var p = ST.patterns;
  if (!p.topics) p.topics = {};
  if (!p.recurringChallenges) p.recurringChallenges = [];
  if (!p.activityLog) p.activityLog = [];
  if (!p.goalProgress) p.goalProgress = [];
  if (!p.weeklyTopics) p.weeklyTopics = {};
  var today = new Date().toISOString().slice(0, 10);
  var hour = new Date().getHours();
  var weekKey = today.slice(0, 7);

  for (var topic in TOPIC_KEYWORDS) {
    if (TOPIC_KEYWORDS[topic].test(userText)) {
      p.topics[topic] = (p.topics[topic] || 0) + 1;
      if (!p.weeklyTopics[weekKey]) p.weeklyTopics[weekKey] = {};
      p.weeklyTopics[weekKey][topic] = (p.weeklyTopics[weekKey][topic] || 0) + 1;
    }
  }

  var challengePatterns = /(?:i keep|i always|i can't stop|i struggle with|every time i|i never|the same problem|again and again|stuck in a loop|falling back into)\s+(.{10,80})/i;
  var challengeMatch = userText.match(challengePatterns);
  if (challengeMatch) {
    var cText = challengeMatch[0].substring(0, 100);
    var found = false;
    for (var c = 0; c < p.recurringChallenges.length; c++) {
      if (p.recurringChallenges[c].text === cText) {
        p.recurringChallenges[c].count++;
        p.recurringChallenges[c].lastSeen = today;
        found = true;
        break;
      }
    }
    if (!found) {
      p.recurringChallenges.push({ text: cText, count: 1, firstSeen: today, lastSeen: today });
    }
    if (p.recurringChallenges.length > 20) p.recurringChallenges = p.recurringChallenges.slice(-20);
  }

  var existingActivity = p.activityLog.find(function(a) { return a.date === today && a.hour === hour; });
  if (existingActivity) {
    existingActivity.msgCount++;
  } else {
    p.activityLog.push({ date: today, hour: hour, msgCount: 1 });
  }
  if (p.activityLog.length > 200) p.activityLog = p.activityLog.slice(-200);

  var goalRe = /(?:my goal|i want to|i plan to|i'm working on|i'm trying to|progress on)\s+(.{10,60})/i;
  var goalMatch = userText.match(goalRe);
  if (goalMatch) {
    var goalText = goalMatch[1].substring(0, 60).trim();
    var existingGoal = p.goalProgress.find(function(gp) { return gp.goal.toLowerCase() === goalText.toLowerCase(); });
    if (existingGoal) {
      existingGoal.mentions++;
      existingGoal.lastMentioned = today;
    } else {
      p.goalProgress.push({ goal: goalText, mentions: 1, lastMentioned: today, status: 'active' });
    }
    if (p.goalProgress.length > 15) p.goalProgress = p.goalProgress.slice(-15);
  }
}

function initHabits() {
  if (!ST.patterns) ST.patterns = { topics: {}, recurringChallenges: [], activityLog: [], goalProgress: [], weeklyTopics: {} };
  if (!ST.patterns.habits) ST.patterns.habits = [];
  if (!ST.patterns.habitLog) ST.patterns.habitLog = {};
}

function addHabit(name, goalLink) {
  initHabits();
  var id = Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  ST.patterns.habits.push({ id: id, name: name, goalLink: goalLink || '', createdAt: new Date().toISOString().slice(0, 10), streak: 0, bestStreak: 0, lastCheckedDate: '', active: true });
  save();
  return id;
}

function removeHabit(id) {
  initHabits();
  ST.patterns.habits = ST.patterns.habits.filter(function(h) { return h.id !== id; });
  save();
}

function toggleHabit(id) {
  initHabits();
  var today = new Date().toISOString().slice(0, 10);
  if (!ST.patterns.habitLog[today]) ST.patterns.habitLog[today] = {};
  var wasChecked = !!ST.patterns.habitLog[today][id];
  ST.patterns.habitLog[today][id] = !wasChecked;
  computeStreaks();
  save();
}

function computeStreaks() {
  initHabits();
  var today = new Date().toISOString().slice(0, 10);
  for (var i = 0; i < ST.patterns.habits.length; i++) {
    var h = ST.patterns.habits[i];
    if (!h.active) continue;
    var streak = 0;
    var d = new Date(today);
    while (true) {
      var key = d.toISOString().slice(0, 10);
      if (ST.patterns.habitLog[key] && ST.patterns.habitLog[key][h.id]) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else {
        break;
      }
    }
    h.streak = streak;
    if (streak > (h.bestStreak || 0)) h.bestStreak = streak;
    h.lastCheckedDate = streak > 0 ? today : h.lastCheckedDate;
  }
  trimHabitLog();
}

function trimHabitLog() {
  if (!ST.patterns || !ST.patterns.habitLog) return;
  var keys = Object.keys(ST.patterns.habitLog).sort();
  if (keys.length > 90) {
    var toRemove = keys.slice(0, keys.length - 90);
    for (var i = 0; i < toRemove.length; i++) delete ST.patterns.habitLog[toRemove[i]];
  }
}

function getHabitCompletionToday() {
  initHabits();
  var today = new Date().toISOString().slice(0, 10);
  var active = ST.patterns.habits.filter(function(h) { return h.active; });
  if (active.length === 0) return null;
  var done = 0;
  var todayLog = ST.patterns.habitLog[today] || {};
  for (var i = 0; i < active.length; i++) {
    if (todayLog[active[i].id]) done++;
  }
  return { done: done, total: active.length };
}

function habitsPromptBlock() {
  initHabits();
  var active = ST.patterns.habits.filter(function(h) { return h.active; });
  if (active.length === 0) return '';
  var today = new Date().toISOString().slice(0, 10);
  var todayLog = ST.patterns.habitLog[today] || {};
  var lines = ['\n\nUSER HABITS (reference naturally, encourage progress, never lecture):'];
  for (var i = 0; i < Math.min(active.length, 5); i++) {
    var h = active[i];
    var done = todayLog[h.id] ? 'done today' : 'not done today';
    var streakStr = h.streak > 0 ? h.streak + '-day streak' : 'no streak';
    var goalStr = h.goalLink ? ' (linked to: ' + h.goalLink + ')' : '';
    lines.push('- ' + h.name + ': ' + done + ', ' + streakStr + (h.bestStreak > 1 ? ', best=' + h.bestStreak : '') + goalStr);
  }
  var comp = getHabitCompletionToday();
  if (comp) lines.push('- Today: ' + comp.done + '/' + comp.total + ' habits completed');
  return lines.join('\n');
}

function getHabitWeeklyStats() {
  initHabits();
  var habits = ST.patterns.habits.filter(function(h) { return h.active; });
  if (habits.length === 0) return [];
  var today = new Date();
  var weeks = [];
  for (var w = 0; w < 4; w++) {
    var weekData = [];
    for (var d = 6; d >= 0; d--) {
      var date = new Date(today);
      date.setDate(date.getDate() - (w * 7 + d));
      var key = date.toISOString().slice(0, 10);
      var dayLog = ST.patterns.habitLog[key] || {};
      var done = 0;
      for (var hi = 0; hi < habits.length; hi++) {
        if (dayLog[habits[hi].id]) done++;
      }
      weekData.push({ date: key, done: done, total: habits.length });
    }
    var totalDone = weekData.reduce(function(s, d) { return s + d.done; }, 0);
    var totalPossible = weekData.reduce(function(s, d) { return s + d.total; }, 0);
    var rate = totalPossible > 0 ? Math.round((totalDone / totalPossible) * 100) : 0;
    var label = w === 0 ? ui('growthThisWeek') : w === 1 ? ui('growthLastWeek') : w + ' ' + ui('growthWeeksAgo');
    weeks.push({ label: label, days: weekData, rate: rate });
  }
  return weeks;
}

function detectMilestones() {
  var milestones = [];
  initHabits();
  var habits = ST.patterns.habits.filter(function(h) { return h.active; });
  for (var i = 0; i < habits.length; i++) {
    var h = habits[i];
    if (h.streak >= 30) milestones.push({ type: 'streak', text: h.name + ': 30+ ' + ui('growthHabitStreak'), priority: 3 });
    else if (h.streak >= 14) milestones.push({ type: 'streak', text: h.name + ': 14+ ' + ui('growthHabitStreak'), priority: 2 });
    else if (h.streak >= 7) milestones.push({ type: 'streak', text: h.name + ': 7+ ' + ui('growthHabitStreak'), priority: 1 });
  }
  var comp = getHabitCompletionToday();
  if (comp && comp.total > 0 && comp.done === comp.total) {
    milestones.push({ type: 'allDone', text: ui('growthAllHabits'), priority: 1 });
  }
  var uniqueDays = {};
  if (ST.patterns && ST.patterns.activityLog) {
    for (var a = 0; a < ST.patterns.activityLog.length; a++) {
      uniqueDays[ST.patterns.activityLog[a].date] = true;
    }
  }
  var dayCount = Object.keys(uniqueDays).length;
  if (dayCount >= 30) milestones.push({ type: 'active', text: '30+ ' + ui('growthDaysActive'), priority: 2 });
  else if (dayCount >= 7) milestones.push({ type: 'active', text: dayCount + ' ' + ui('growthDaysActive'), priority: 1 });
  var memCount = (ST.memories || []).length;
  if (memCount >= 50) milestones.push({ type: 'memories', text: '50+ ' + ui('growthMemories'), priority: 2 });
  else if (memCount >= 10) milestones.push({ type: 'memories', text: memCount + ' ' + ui('growthMemories'), priority: 1 });
  var topicCount = ST.patterns && ST.patterns.topics ? Object.keys(ST.patterns.topics).length : 0;
  if (topicCount >= 5) milestones.push({ type: 'topics', text: topicCount + ' ' + ui('growthTopicsExplored'), priority: 1 });
  milestones.sort(function(a, b) { return b.priority - a.priority; });
  return milestones;
}

function getPatternInsights() {
  var insights = [];
  var topTopics = getTopTopics(3);
  if (topTopics.length >= 2) {
    var topName = topTopics[0].topic;
    insights.push({ text: topName.charAt(0).toUpperCase() + topName.slice(1) + ' (' + topTopics[0].count + 'x) — ' + topTopics.slice(1).map(function(t) { return t.topic + ' (' + t.count + 'x)'; }).join(', '), type: 'topics' });
  }
  if (ST.patterns && ST.patterns.weeklyTopics) {
    var months = Object.keys(ST.patterns.weeklyTopics).sort();
    if (months.length >= 2) {
      var prev = ST.patterns.weeklyTopics[months[months.length - 2]] || {};
      var curr = ST.patterns.weeklyTopics[months[months.length - 1]] || {};
      var newTopics = [];
      for (var t in curr) {
        if (!prev[t] || curr[t] > prev[t] * 1.5) newTopics.push(t);
      }
      if (newTopics.length > 0) {
        insights.push({ text: newTopics.join(', ') + ' — trending up recently', type: 'trend' });
      }
    }
  }
  if (ST.patterns && ST.patterns.recurringChallenges) {
    var resolved = ST.patterns.recurringChallenges.filter(function(c) {
      if (c.count < 2) return false;
      var daysSince = Math.floor((new Date() - new Date(c.lastSeen)) / (1000 * 60 * 60 * 24));
      return daysSince > 14;
    });
    for (var r = 0; r < Math.min(resolved.length, 2); r++) {
      insights.push({ text: '"' + resolved[r].text.substring(0, 50) + '..." — not mentioned in 2+ weeks', type: 'resolved' });
    }
    var active = ST.patterns.recurringChallenges.filter(function(c) { return c.count >= 3; });
    for (var ac = 0; ac < Math.min(active.length, 2); ac++) {
      insights.push({ text: '"' + active[ac].text.substring(0, 50) + '..." — mentioned ' + active[ac].count + ' times', type: 'challenge' });
    }
  }
  initHabits();
  var bestHabit = null;
  var habits = ST.patterns.habits.filter(function(h) { return h.active; });
  for (var hi = 0; hi < habits.length; hi++) {
    if (!bestHabit || habits[hi].streak > bestHabit.streak) bestHabit = habits[hi];
  }
  if (bestHabit && bestHabit.streak > 0) {
    insights.push({ text: bestHabit.name + ' — ' + bestHabit.streak + '-day streak (best: ' + (bestHabit.bestStreak || bestHabit.streak) + ')', type: 'habit' });
  }
  var trend = getMoodTrend();
  if (trend === 'positive') insights.push({ text: ui('growthMoodUp'), type: 'mood' });
  else if (trend === 'declining') insights.push({ text: ui('growthMoodDown'), type: 'mood' });
  else if (trend === 'stable' && ST.moodLog && ST.moodLog.length >= 5) insights.push({ text: ui('growthMoodStable'), type: 'mood' });
  return insights;
}

function generateEvolutionSummary() {
  var lines = [];
  var uniqueDays = {};
  var totalMsgs = 0;
  if (ST.patterns && ST.patterns.activityLog) {
    for (var a = 0; a < ST.patterns.activityLog.length; a++) {
      uniqueDays[ST.patterns.activityLog[a].date] = true;
      totalMsgs += ST.patterns.activityLog[a].msgCount;
    }
  }
  var dayCount = Object.keys(uniqueDays).length;
  if (dayCount > 0) lines.push(dayCount + ' ' + ui('growthDaysActive') + ' · ' + totalMsgs + ' ' + ui('growthMessages'));
  var topTopics = getTopTopics(3);
  if (topTopics.length > 0) {
    lines.push(topTopics.map(function(t) { return t.topic; }).join(', ') + ' — ' + topTopics.length + ' ' + ui('growthTopicsExplored'));
  }
  initHabits();
  var habits = ST.patterns.habits.filter(function(h) { return h.active; });
  if (habits.length > 0) {
    var weekStats = getHabitWeeklyStats();
    if (weekStats.length > 0) {
      var thisWeekRate = weekStats[0].rate;
      var lastWeekRate = weekStats.length > 1 ? weekStats[1].rate : 0;
      var diff = thisWeekRate - lastWeekRate;
      var arrow = diff > 5 ? ' ^' : diff < -5 ? ' v' : ' =';
      lines.push(habits.length + ' habits · ' + thisWeekRate + '% ' + ui('growthCompletionRate') + arrow);
    }
  }
  var memCount = (ST.memories || []).length;
  if (memCount > 0) lines.push(memCount + ' ' + ui('growthMemories'));
  var trend = getMoodTrend();
  if (trend) {
    lines.push(trend === 'positive' ? ui('growthMoodUp') : trend === 'declining' ? ui('growthMoodDown') : ui('growthMoodStable'));
  }
  return lines.length > 0 ? lines.join('\n') : ui('growthEmpty');
}

      }
    }
    html += '</div>';

    if (trend) {
      var trendColor = trend === 'positive' ? 'var(--accent)' : trend === 'declining' ? '#f87171' : 'var(--muted)';
      html += '<div style="font-size:0.82rem;color:' + trendColor + ';margin-top:6px;">' + (trend === 'positive' ? ui('growthMoodUp') : trend === 'declining' ? ui('growthMoodDown') : ui('growthMoodStable')) + '</div>';
    }
  }
  html += '</div>';
  html += '<div class="growth-section"><div class="growth-section-title">' + ui('growthHabitTrends') + '</div>';
  initHabits();
  var habits = ST.patterns.habits.filter(function(h) { return h.active; });
  if (habits.length === 0) {
    html += '<div class="growth-empty">' + ui('growthNoHabits') + '</div>';
  } else {
    var weekStats = getHabitWeeklyStats();
    for (var wi = 0; wi < weekStats.length; wi++) {
      var ws = weekStats[wi];
      html += '<div class="habit-week-row" data-testid="habit-week-' + wi + '">';
      html += '<span class="habit-week-label">' + esc(ws.label) + '</span>';
      html += '<div class="habit-week-bars">';
      for (var di = 0; di < ws.days.length; di++) {
        var dPct = ws.days[di].total > 0 ? Math.round((ws.days[di].done / ws.days[di].total) * 100) : 0;
        var barH = Math.max(2, (dPct / 100) * 24);
        var barColor = dPct === 100 ? 'var(--accent)' : dPct > 0 ? 'rgba(155,109,255,0.4)' : 'rgba(255,255,255,0.06)';
        html += '<div class="habit-week-bar" style="height:' + barH + 'px;background:' + barColor + ';" title="' + ws.days[di].date + ': ' + ws.days[di].done + '/' + ws.days[di].total + '"></div>';
      }
      html += '</div>';
      html += '<span class="habit-week-pct">' + ws.rate + '%</span>';
      html += '</div>';
    }
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function getTopTopics(n) {
  if (!ST.patterns || !ST.patterns.topics) return [];
  var entries = Object.keys(ST.patterns.topics).map(function(k) { return { topic: k, count: ST.patterns.topics[k] }; });
  entries.sort(function(a, b) { return b.count - a.count; });
  return entries.slice(0, n || 5);
}

  en: { work: 'career', health: 'health', relationships: 'relationships', money: 'finances', goals: 'goals', learning: 'growth', creativity: 'creativity', habits: 'habits' },

  ja: { work: 'キャリア', health: '健康', relationships: '人間関係', money: 'お金', goals: '目標', learning: '学び', creativity: '創造性', habits: '習慣' },

};
var DAILY_TOPIC_SET = { health: 1, habits: 1 };

var DEFAULT_DAILY_SUB = { en: 'health, habits, energy', th: 'สุขภาพ นิสัย อารมณ์', ja: '健康、習慣、気分', es: 'salud, hábitos, ánimo', ko: '건강, 습관, 기분' };

function getPersonalizedTabSubs() {
  var lang = (ST.lang || 'en').split('-')[0];
  var labels = TOPIC_LABELS[lang] || TOPIC_LABELS.en;
  var topics = ST.patterns && ST.patterns.topics ? ST.patterns.topics : {};
  var sorted = Object.keys(topics)
    .map(function(k) { return { key: k, count: topics[k] }; })
    .sort(function(a, b) { return b.count - a.count; });
  var dailyFound = [];
  var deepFound = [];
  for (var i = 0; i < sorted.length; i++) {
    var k = sorted[i].key;
    if (DAILY_TOPIC_SET[k] && dailyFound.length < 3) dailyFound.push(labels[k] || k);
    else if (DEEP_TOPIC_SET[k] && deepFound.length < 3) deepFound.push(labels[k] || k);
  }
  return {
    daily: dailyFound.length >= 1 ? dailyFound.join(', ') : (DEFAULT_DAILY_SUB[lang] || DEFAULT_DAILY_SUB.en),
    deep: deepFound.length >= 1 ? deepFound.join(', ') : (DEFAULT_DEEP_SUB[lang] || DEFAULT_DEEP_SUB.en)
  };
}

function getActivityPeak() {
  if (!ST.patterns || !ST.patterns.activityLog || ST.patterns.activityLog.length === 0) return null;
  var hourCounts = {};
  for (var i = 0; i < ST.patterns.activityLog.length; i++) {
    var h = ST.patterns.activityLog[i].hour;
    hourCounts[h] = (hourCounts[h] || 0) + ST.patterns.activityLog[i].msgCount;
  }
  var peakHour = 0, peakCount = 0;
  for (var hr in hourCounts) {
    if (hourCounts[hr] > peakCount) { peakCount = hourCounts[hr]; peakHour = parseInt(hr); }
  }
  return { hour: peakHour, count: peakCount };
}

function getMoodTimeCorrelation() {
  if (!ST.moodLog || ST.moodLog.length < 5) return null;
  var timeBuckets = { morning: { total: 0, neg: 0 }, afternoon: { total: 0, neg: 0 }, evening: { total: 0, neg: 0 }, night: { total: 0, neg: 0 } };
  for (var i = 0; i < ST.moodLog.length; i++) {
    var m = ST.moodLog[i];
    var h = m.hour !== undefined ? m.hour : 12;
    var bucket = h < 6 ? 'night' : h < 12 ? 'morning' : h < 18 ? 'afternoon' : h < 22 ? 'evening' : 'night';
    timeBuckets[bucket].total++;
    if (m.score < 0) timeBuckets[bucket].neg++;
  }
  var worst = null, worstRatio = 0;
  for (var b in timeBuckets) {
    if (timeBuckets[b].total >= 2) {
      var ratio = timeBuckets[b].neg / timeBuckets[b].total;
      if (ratio > 0.5 && ratio > worstRatio) { worst = b; worstRatio = ratio; }
    }
  }
  return worst;
}

function systemPrompt(userText) {
  var userName = ST.ans.name || 'friend';

  var tonePreference = tone.includes('Very direct') || tone.includes('とても直接的') || tone.includes('Muy directo') || tone.includes('ตรงมาก') || tone.includes('매우 직접적') ? 'direct' : tone.includes('Gentle') || tone.includes('優しく') || tone.includes('Gentil') || tone.includes('อ่อนโยน') || tone.includes('부드럽게') ? 'gentle' : 'thoughtful';
  var pressure = ST.ans.pressure || '';
  var coachingMode = pressure.includes('Push') || pressure.includes('プッシュ') || pressure.includes('Empújame') || pressure.includes('ผลักดัน') || pressure.includes('밀어붙여') ? 'push' : pressure.includes('Support') || pressure.includes('サポート') || pressure.includes('Apóyame') || pressure.includes('สนับสนุน') || pressure.includes('지지') ? 'support' : 'adapt';
  var langRule = ST.lang && ST.lang !== 'en' ? '\n- IMPORTANT: You MUST respond entirely in ' + langName() + '. Every word of your response must be in ' + langName() + '.' : '';
  var memoryBlock = userText ? retrieveRelevantMemories(userText) : '';
  var triggerBlock = triggersPromptBlock();
  var patternBlock = patternsPromptBlock();
  var habitBlock = habitsPromptBlock();
  var summaryBlock = getThreadSummary() ? '\n\nPREVIOUS CONVERSATION SUMMARY:\n' + getThreadSummary() : '';

  var toneAdaptation = tonePreference === 'direct'
    ? '- User wants very direct communication: less hedging, clearer language, faster to the point. Never commanding or harsh.'
    : tonePreference === 'gentle'
    ? '- User wants gentle communication: more acknowledgment before insight, softer framing. Still delivers honest truth.'
    : '- User wants honest but thoughtful communication: truth delivered with care, direct but respectful.';
  toneAdaptation += '\nRegardless of tone preference, always maintain calm, grounded, and respectful communication. The tone adjusts. The respect never changes.';

  var coachingRule = coachingMode === 'push'
    ? '- User wants to be pushed: challenge even when comfortable, raise the bar, question excuses'
    : coachingMode === 'support'
    ? '- User wants support without pressure: prioritize sustainable pace, avoid burnout, build gradually'
    : '- User wants adaptive coaching: read the situation and adjust intensity accordingly';

  return 'User: ' + userName + '\n' + buildProfile() + summaryBlock + memoryBlock + triggerBlock + patternBlock + habitBlock + '\n\nRESPONSE LENGTH: Match question energy. Short=1-2 sentences. Medium=2-3 paragraphs. Deep=up to 4-5. No filler.\n' + toneAdaptation + '\n' + coachingRule + '\n\nUse profile silently to personalize — never quote it back. Reference memories naturally like a friend who remembers. Answer what was asked. If casual, chat casually.' + langRule;
}

async function sendMsg(userText) {
  trackMood(userText);
  trackPatterns(userText);
  pendingModeShift = false;
  if (currentMode === 'daily' && modeShiftSuppressCount > 0) modeShiftSuppressCount--;
  var allMsgs = getAllMsgs();
  var userMsg = { role: 'user', content: userText, mode: currentMode, ts: Date.now() };
  var assistMsg = { role: 'assistant', content: '', mode: currentMode, ts: Date.now() };
  if (currentMode === 'deep') { userMsg.deepSessionId = ST.deepSessionId; assistMsg.deepSessionId = ST.deepSessionId; }
  allMsgs.push(userMsg);
  allMsgs.push(assistMsg);
  setActiveMsgs(allMsgs);
  responseNudge = null;
  ST.streaming = true;
  var threads = getThreads();
  var activeMsgs = getActiveMsgs();
  if (threads[ST.activeThread]) {
    var autoName = autoThreadName(activeMsgs);
    if (autoName && (threads[ST.activeThread].name === ui('mainThread') || /^\d+$/.test(threads[ST.activeThread].name))) {
      threads[ST.activeThread].name = autoName;
    }
  }
  render();
  var msgsForApi = compressContext(activeMsgs.slice(0, -1)).map(function(m) { return { role: m.role, content: m.content }; });
  try {
    var controller = new AbortController();
    var fetchTimeout = setTimeout(function() { controller.abort(); }, 60000);
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stream: true, system: buildAssistantPrompt(buildProfile(), userText), messages: msgsForApi, mode: currentMode }),
      signal: controller.signal
    });
    clearTimeout(fetchTimeout);
    if (res.status === 429) {
      var curMsgs2 = getActiveMsgs();
      curMsgs2[curMsgs2.length - 1].content = ui('limitReached');
      setActiveMsgs(curMsgs2);
      ST.loading = false;
      ST.streaming = false;
      render();
      return;
    }
    if (!res.ok) {
      throw new Error('Server error: ' + res.status);
    }
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buffer += decoder.decode(chunk.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line.startsWith('data: ')) continue;
        var dataStr = line.slice(6);
        if (dataStr === '[DONE]') continue;
        try {
          var evt = JSON.parse(dataStr);
          if (evt.type === 'error') {
            console.error('Stream error from API:', evt.error);
            var errMsgs = getActiveMsgs();
            if (errMsgs.length > 0 && !errMsgs[errMsgs.length - 1].content) {
              errMsgs[errMsgs.length - 1].content = ui('chatError');
              setActiveMsgs(errMsgs);
            }
          } else if (evt.type === 'meta' && evt.suggestModeShift) {
            if (modeShiftSuppressCount <= 0) {
              pendingModeShift = true;
              var ctxMsgs = getActiveMsgs().filter(function(m) { return m.role === 'user'; });
              pendingModeShiftContext = ctxMsgs.length ? ctxMsgs[ctxMsgs.length - 1].content : null;
            }
          } else if (evt.type === 'meta' && evt.nudge) {
            responseNudge = evt.nudgeMessage || null;
          } else if (evt.text) {
            var curMsgs = getAllMsgs();
            curMsgs[curMsgs.length - 1].content += evt.text;
            updateStreamBubble();
          }
        } catch(e2) {}
      }
    }
  } catch(e) {
    console.error('Chat fetch error:', e.message || e);
    var aMsgs = getActiveMsgs();
    if (aMsgs.length > 0 && !aMsgs[aMsgs.length - 1].content) {
      try {
        console.log('Retrying chat request...');
        var retryRes = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ stream: true, system: buildAssistantPrompt(buildProfile(), userText), messages: msgsForApi, mode: currentMode })
        });
        if (retryRes.ok) {
          var retryReader = retryRes.body.getReader();
          var retryDecoder = new TextDecoder();
          var retryBuf = '';
          while (true) {
            var rc = await retryReader.read();
            if (rc.done) break;
            retryBuf += retryDecoder.decode(rc.value, { stream: true });
            var rLines = retryBuf.split('\n');
            retryBuf = rLines.pop() || '';
            for (var ri = 0; ri < rLines.length; ri++) {
              var rLine = rLines[ri].trim();
              if (!rLine.startsWith('data: ')) continue;
              var rData = rLine.slice(6);
              if (rData === '[DONE]') continue;
              try {
                var rEvt = JSON.parse(rData);
                if (rEvt.type === 'meta' && rEvt.suggestModeShift) {
                  if (modeShiftSuppressCount <= 0) {
                    pendingModeShift = true;
                    var rCtxMsgs = getActiveMsgs().filter(function(m) { return m.role === 'user'; });
                    pendingModeShiftContext = rCtxMsgs.length ? rCtxMsgs[rCtxMsgs.length - 1].content : null;
                  }
                } else if (rEvt.text) {
                  var rMsgs = getAllMsgs();
                  rMsgs[rMsgs.length - 1].content += rEvt.text;
                  updateStreamBubble();
                }
              } catch(re) {}
            }
          }
        } else {
          aMsgs[aMsgs.length - 1].content = ui('chatError');
          setActiveMsgs(aMsgs);
        }
      } catch(retryErr) {
        console.error('Retry also failed:', retryErr.message || retryErr);
        aMsgs[aMsgs.length - 1].content = ui('chatError');
        setActiveMsgs(aMsgs);
      }
    }
  }
  ST.loading = false;
  ST.streaming = false;
  var finalMsgs = getActiveMsgs();
  var lastMsg = finalMsgs[finalMsgs.length - 1];
  var userMsg = finalMsgs.length >= 2 ? finalMsgs[finalMsgs.length - 2] : null;
  if (userMsg && userMsg.role === 'user' && lastMsg && lastMsg.role === 'assistant') {
    extractMemories(userMsg.content, lastMsg.content);
  }
  // If AI response mentions Deep Thinking mode, show the chip — regardless of backend keywords.
  // This lets Claude's own semantic analysis drive the suggestion, not just keyword matching.
  if (currentMode === 'daily' && lastMsg && lastMsg.role === 'assistant' && !pendingModeShift && modeShiftSuppressCount <= 0) {
    var respLower = (lastMsg.content || '').toLowerCase();
    var shiftPhrases = ['deep thinking mode', 'deep thinking tab', 'into deep thinking', 'move to deep thinking',
      'explore in deep thinking', 'explore it in deep thinking', 'คิดแบบเชิงลึก', 'คิดเชิงลึก', 'โหมดเชิงลึก'];
    if (shiftPhrases.some(function(p) { return respLower.includes(p); })) {
      pendingModeShift = true;
      if (userMsg && userMsg.role === 'user') pendingModeShiftContext = userMsg.content;
    }
  }
  ST.lastActiveDate = new Date().toISOString().slice(0, 10);
  save();
  render();
  setTimeout(function() { var el = document.getElementById('chat-end'); if (el) el.scrollIntoView({ behavior: 'smooth' }); }, 100);
  if (ST.autoSpeak && lastMsg && lastMsg.role === 'assistant' && lastMsg.content && hasVoiceOutput()) {
    ST.autoSpeak = false;
    setTimeout(function() {
      var playBtn = document.querySelector('[data-vidx="' + (finalMsgs.length - 1) + '"]');
      speakText(lastMsg.content, playBtn || null);
    }, 400);
  }
}

function updateStreamBubble() {
  var lastBubble = document.getElementById('stream-bubble');
  if (lastBubble) {
    var aMsgs = getActiveMsgs();
    if (aMsgs.length > 0) {

function reset() {
  if (!confirm(ui('deleteConfirm'))) return;
  var keepLang = ST.lang;
  try { localStorage.removeItem('la'); } catch(e) {}
  ST = { stage: 'welcome', step: 0, ans: {}, msgs: [], selMulti: [], lang: keepLang, threads: [], activeThread: 0, lastCheckin: '', guestMsgCount: 0, onboardingComplete: false, onboardingProgress: {}, onboardingState: {}, onboardingMsgs: [] };
  OB_SENDING = false;
  checkinDismissed = false;
  save();
  render();
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function langSwitcherHtml() {
  var html = '<div class="lang-switcher" data-testid="lang-switcher">';
  var keys = Object.keys(LANGS);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var active = (ST.lang || 'en') === k ? ' active' : '';
    html += '<button class="lang-mini' + active + '" data-lang="' + k + '" data-testid="lang-mini-' + k + '">' + LANGS[k].flag + '</button>';
  }
  html += '</div>';
  return html;
}

function bindLangSwitcher() {
  document.querySelectorAll('.lang-mini').forEach(function(btn) {
    btn.onclick = function() {
      ST.lang = btn.dataset.lang;
      save();
      render();
    };
  });
}

function render() {
  var root = document.getElementById('root');
  if (!AUTH.checked) return;
  if (!AUTH.loggedIn && !AUTH.guest) { renderAuth(root); return; }
  // Guests skip onboarding — they go straight to chat
  if (AUTH.guest) {
    if (ST.stage === 'welcome' || ST.stage === 'questions' || ST.stage === 'mirror') { renderChat(root); return; }
    renderChat(root); return;
  }
  // Conversational onboarding gate — logged-in users only
  if (!ST.onboardingComplete) { renderOnboardingChat(root); return; }
  // Onboarding done — normal app
  if (ST.stage === 'welcome' || ST.stage === 'questions' || ST.stage === 'mirror') {
    ST.stage = 'chat';
    if (!ST.threads || ST.threads.length === 0) {
      var greet = [{ role: 'assistant', content: chatGreeting(), mode: 'deep' }];
      ST.msgs = greet;
      ST.threads = [{ name: ui('mainThread'), msgs: greet }];
      ST.activeThread = 0;
      currentMode = 'daily';
    }
    save();
  }
  renderChat(root);
}

function renderOnboardingChat(root) {

  var lastCategory = (ST.onboardingProgress || {}).lastCategoryDiscussed;
  var isResuming = lastCategory && msgs.length === 0;
  var isFirstOpen = msgs.length === 0 && !lastCategory;

  // Build messages HTML
  var msgsHtml = msgs.map(function(m, idx) {
    var content = m.content ? m.content.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>') : '';
    var inlineChipsHtml = '';
    if (m.chips && m.chips.length && idx === msgs.length - 1 && !OB_SENDING) {
      inlineChipsHtml = '<div class="ob-inline-chips">' +
        m.chips.map(function(c) {
          return '<button class="ob-chip" data-obchip="' + c.replace(/"/g, '&quot;') + '">' + c.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</button>';

  if (OB_SENDING) {

  }

  // If no messages yet, show the initial greeting
  var initialGreetingHtml = '';
  if (msgs.length === 0) {

      greetingText = getObResumeMessage(lang, lastCategory);
    } else {
      greetingText = OB_START_MSGS[lang] || OB_START_MSGS.en;
    }

      '<div class="ob-bubble assistant">' + greetingText.replace(/\n/g, '<br>') + '</div></div>';

  // Chips (shown when no sending, and when appropriate)
  var chipsHtml = '';

    if (msgs.length === 0 && isFirstOpen) {
      var chips = OB_START_CHIPS[lang] || OB_START_CHIPS.en;

      '<textarea class="ob-input" id="ob-input" placeholder="' + esc(OB_PLACEHOLDER[lang] || OB_PLACEHOLDER.en) + '" data-testid="input-onboarding" rows="1"></textarea>' +

      var isTouchDev = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      if (e.key === 'Enter' && !e.shiftKey && !isTouchDev) {

        var txt = inputEl.value.trim();
        if (txt && !OB_SENDING) sendOnboardingMessage(txt);
      }
    };
    inputEl.focus();
  }

  bindLangSwitcher();

async function sendOnboardingMessage(message) {
  if (OB_SENDING) return;
  var lang = ST.lang || 'en';

  // Add user message to UI (unless it's a system action)
  var isSystemAction = message === '__skip__' || message === '__start__' || message === '__continue__';
  if (!isSystemAction) {
    ST.onboardingMsgs = ST.onboardingMsgs || [];
    ST.onboardingMsgs.push({ role: 'user', content: message });
  } else if (message === '__skip__') {
    // Show skip message locally then transition
    OB_SENDING = true;
    render();
    try {
      var skipRes = await fetch('/api/onboarding-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ message: '__skip__', lang: lang })
      });
      var skipData = await skipRes.json();
      ST.onboardingComplete = true;
      ST.onboardingState = {};
      ST.stage = 'chat';
      var greet = [{ role: 'assistant', content: chatGreeting(), mode: 'deep' }];
      ST.msgs = greet;
      ST.threads = [{ name: ui('mainThread'), msgs: greet }];
      ST.activeThread = 0;
      currentMode = 'daily';
      openingLoadedFor = {};
      OB_SENDING = false;
      save();
      render();
      loadOpeningMessage();
    } catch(e) {
      OB_SENDING = false;
      render();
    }
    return;
  } else if (message === '__continue__') {
    // Resume: skip to completion
    ST.onboardingComplete = true;
    ST.onboardingState = {};
    ST.stage = 'chat';
    var greet = [{ role: 'assistant', content: chatGreeting(), mode: 'deep' }];
    ST.msgs = greet;
    ST.threads = [{ name: ui('mainThread'), msgs: greet }];
    ST.activeThread = 0;
    currentMode = 'daily';
    openingLoadedFor = {};
    save();
    render();
    loadOpeningMessage();
    return;
  }

  OB_SENDING = true;
  render();

  try {
    var apiMsg = message === '__start__' ? 'start' : message;
    var res = await fetch('/api/onboarding-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ message: apiMsg, lang: lang })
    });
    var data = await res.json();

    ST.onboardingMsgs = ST.onboardingMsgs || [];
    if (data.text) {
      ST.onboardingMsgs.push({ role: 'assistant', content: data.text, chips: data.chips || null });
    }

    if (data.onboardingComplete) {
      // Transition to full chat after a brief moment to show completion message
      ST.onboardingState = {};
      save();
      OB_SENDING = false;
      render();
      setTimeout(function() {
        ST.onboardingComplete = true;
        ST.stage = 'chat';
        var greet = [{ role: 'assistant', content: chatGreeting(), mode: 'deep' }];
        ST.msgs = greet;
        ST.threads = [{ name: ui('mainThread'), msgs: greet }];
        ST.activeThread = 0;
        currentMode = 'daily';
        openingLoadedFor = {};
        save();
        render();
        loadOpeningMessage();
      }, 3200);
    } else {
      OB_SENDING = false;
      save();
      render();
    }
  } catch(e) {
    OB_SENDING = false;
    render();
  }
}

  var qDef = Q[ST.step];
  var q = getQ(qDef);
  var pct = Math.round(((ST.step + 1) / Q.length) * 100);
  var sv = ST.ans[q.id];
  var inp = '';
  var dynamicOpts = [];
  if (q.t === 'text') {
    inp = '<input class="field-text" id="qa" type="text" placeholder="' + esc(q.p || '') + '" value="' + esc(sv || '') + '" data-testid="input-answer">';
  } else if (q.t === 'textarea') {
    inp = '<textarea class="field-area" id="qa" placeholder="' + esc(q.p || '') + '" data-testid="input-answer">' + esc(sv || '') + '</textarea>';
  } else if (q.t === 'slider') {
    var v = sv || Math.round((qDef.min + qDef.max) / 2);
    inp = '<div class="slider-num" id="sn">' + v + '</div><input class="field-range" id="qa" type="range" min="' + qDef.min + '" max="' + qDef.max + '" value="' + v + '" data-testid="input-slider"><div class="range-labels"><span>' + (q.sl ? q.sl[0] : '') + '</span><span>' + (q.sl ? q.sl[1] : '') + '</span></div>';
  } else if (q.t === 'select') {
    inp = (q.o || []).map(function(o, i) { return '<button class="opt-btn" data-i="' + i + '" data-testid="option-' + i + '">' + o + '</button>'; }).join('');
  } else if (q.t === 'multi') {
    var sel = Array.isArray(sv) ? sv : [];
    inp = '<div>' + (q.o || []).map(function(o, i) {
      var c = sel.includes(o);
      return '<div class="check-row' + (c ? ' checked' : '') + '" data-i="' + i + '" data-testid="check-' + i + '"><div class="check-box">' + (c ? '&#10003;' : '') + '</div><span>' + o + '</span></div>';
    }).join('') + '</div>';
  } else if (q.t === 'dynamic_multi') {
    dynamicOpts = Array.isArray(ST.ans.insec) && ST.ans.insec.length > 0 ? ST.ans.insec : [];
    var sel = Array.isArray(sv) ? sv : [];
    if (dynamicOpts.length > 0) {
      inp = '<div>' + dynamicOpts.map(function(o, i) {
        var c = sel.includes(o);
        return '<div class="check-row' + (c ? ' checked' : '') + '" data-i="' + i + '" data-testid="check-' + i + '"><div class="check-box">' + (c ? '&#10003;' : '') + '</div><span>' + o + '</span></div>';
      }).join('') + '</div>';
    } else {
      inp = '<textarea class="field-area" id="qa" placeholder="' + esc(q.p || '') + '" data-testid="input-answer">' + esc((Array.isArray(sv) ? sv.join(', ') : sv) || '') + '</textarea>';
    }
  }
  var showNext = q.t !== 'select';
  var skipBtn = qDef.optional ? '<button class="btn-skip" id="sb" data-testid="button-skip">' + (q.skipLabel || 'Skip') + '</button>' : '';
  var questionHtml = q.q.replace(/\n/g, '<br>');
  root.innerHTML = langSwitcherHtml() + '<div class="page"><div class="card">' +
    '<div class="sec-badge">' + sectionName(q.s) + '</div>' +
    '<div class="prog-row"><span>' + (ST.step + 1) + ' ' + ui('of') + ' ' + Q.length + '</span><span>' + pct + '%</span></div>' +
    '<div class="prog-track"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="question-text">' + questionHtml + '</div>' +
    (q.h ? '<div class="hint-text">' + q.h + '</div>' : '') +
    inp +
    '<div class="btn-row">' +
    (ST.step > 0 ? '<button class="btn-back" id="bb" data-testid="button-back">' + ui('back') + '</button>' : '') +
    skipBtn +
    (showNext ? '<button class="btn-primary" id="nb" data-testid="button-next">' + ui('next') + '</button>' : '') +
    '</div>' +
    '<div class="reset-link" id="rb" data-testid="link-reset">' + ui('resetAll') + '</div>' +
    '</div></div>';
  if (q.t === 'slider') {
    var sl = document.getElementById('qa');
    var sn = document.getElementById('sn');
    sl.oninput = function() { sn.textContent = sl.value; };
  }
  if (q.t === 'select') {
    document.querySelectorAll('.opt-btn').forEach(function(btn) {
      btn.onclick = function() {
        ST.ans[q.id] = (q.o || [])[parseInt(btn.dataset.i)];
        advance();
      };
    });
  }
  if (q.t === 'multi' || (q.t === 'dynamic_multi' && dynamicOpts.length > 0)) {
    document.querySelectorAll('.check-row').forEach(function(row) {
      row.onclick = function() {
        var opts = q.t === 'dynamic_multi' ? dynamicOpts : (q.o || []);
        var val = opts[parseInt(row.dataset.i)];
        var sel2 = Array.isArray(ST.ans[q.id]) ? ST.ans[q.id].slice() : [];
        if (sel2.includes(val)) { sel2 = sel2.filter(function(x) { return x !== val; }); }
        else { sel2.push(val); }
        ST.ans[q.id] = sel2;
        var box = row.querySelector('.check-box');
        if (sel2.includes(val)) { row.classList.add('checked'); box.innerHTML = '&#10003;'; }
        else { row.classList.remove('checked'); box.innerHTML = ''; }
      };
    });
  }
  var nb = document.getElementById('nb');
  if (nb) { nb.onclick = function() { var el = document.getElementById('qa'); if (el) ST.ans[q.id] = el.value; advance(); }; }
  var sb = document.getElementById('sb');
  if (sb) { sb.onclick = function() { ST.ans[q.id] = ''; advance(); }; }
  var bb = document.getElementById('bb');
  if (bb) { bb.onclick = function() { ST.step--; save(); render(); }; }
  document.getElementById('rb').onclick = reset;
  bindLangSwitcher();
}

function advance() {
  save();
  if (ST.step < Q.length - 1) { ST.step++; render(); }
  else { buildIdentityProfile(); ST.stage = 'mirror'; render(); }

async function summarizeDeepSession(msgs, sessionId) {
  var userMsgs = msgs.filter(function(m) { return m.role === 'user'; });
  if (userMsgs.length === 0) return;
  try {
    var res = await fetch('/api/deep-summary', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ messages: msgs, lang: ST.lang || 'en' })
    });
    var data = await res.json();
    if (data.summary) {
      ST.deepSessionSummaries = ST.deepSessionSummaries || [];
      ST.deepSessionSummaries.push({
        id: sessionId,
        date: new Date().toLocaleDateString(ST.lang === 'th' ? 'th-TH' : 'en-US', { month: 'short', day: 'numeric' }),
        summary: data.summary,
        turns: userMsgs.length
      });
      save();
    }
  } catch (e) {}
}
