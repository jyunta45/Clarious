<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Life Assistant</title> <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/> <style> :root{--bg:#0d0d14;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.12);--accent:#9b6dff;--accent2:#ff6db5;--gold:#f5c842;--text:#f0eaff;--muted:#9985c0;--radius:20px;} *{margin:0;padding:0;box-sizing:border-box;} body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 20%,rgba(155,109,255,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,109,181,0.1) 0%,transparent 60%);} .page{max-width:780px;margin:0 auto;padding:40px 20px;min-height:100vh;display:flex;align-items:center;justify-content:center;} .card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:52px;width:100%;} .brand{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:700;text-align:center;background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;} .tagline{text-align:center;color:var(--muted);font-size:1.1rem;margin-bottom:40px;} .meta-list{background:rgba(155,109,255,0.1);border:1px solid rgba(155,109,255,0.2);border-radius:var(--radius);padding:28px;margin-bottom:36px;} .meta-list p{color:var(--muted);line-height:2;font-size:0.95rem;} .meta-list strong{color:var(--text);} .btn-primary{width:100%;padding:18px;font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:0.5px;transition:opacity 0.2s,transform 0.15s;} .btn-primary:hover{opacity:0.9;transform:translateY(-1px);} .sec-badge{display:inline-block;background:rgba(245,200,66,0.15);border:1px solid rgba(245,200,66,0.3);color:var(--gold);font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;padding:5px 14px;border-radius:100px;margin-bottom:18px;} .prog-row{display:flex;justify-content:space-between;font-size:0.82rem;color:var(--muted);margin-bottom:8px;} .prog-track{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:32px;overflow:hidden;} .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.4s ease;} .question-text{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;line-height:1.4;margin-bottom:10px;color:#fff;} .hint-text{font-size:0.85rem;color:var(--muted);margin-bottom:24px;} .field-text,.field-area{width:100%;padding:14px 18px;background:rgba(255,255,255,0.07);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;margin-bottom:8px;transition:border-color 0.2s;box-sizing:border-box;} .field-text::placeholder,.field-area::placeholder{color:var(--muted);} .field-text:focus,.field-area:focus{outline:none;border-color:var(--accent);} .field-area{min-height:110px;resize:vertical;} .slider-num{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:700;color:var(--gold);text-align:center;margin-bottom:6px;} .field-range{width:100%;-webkit-appearance:none;height:6px;background:rgba(255,255,255,0.1);border-radius:6px;outline:none;cursor:pointer;margin-bottom:8px;accent-color:var(--accent);} .field-range::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 12px rgba(155,109,255,0.5);} .range-labels{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--muted);margin-bottom:24px;} .opt-btn{width:100%;text-align:left;padding:15px 20px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.97rem;cursor:pointer;margin-bottom:10px;transition:all 0.2s;} .opt-btn:hover{background:rgba(155,109,255,0.12);border-color:var(--accent);transform:translateX(4px);} .check-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:8px;transition:all 0.2s;user-select:none;} .check-row.checked{background:rgba(155,109,255,0.15);border-color:var(--accent);} .check-box{width:20px;height:20px;border:2px solid var(--muted);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:0.7rem;color:white;} .check-row.checked .check-box{background:var(--accent);border-color:var(--accent);} .btn-row{display:flex;gap:12px;margin-top:28px;} .btn-back{padding:16px 28px;background:rgba(255,255,255,0.07);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:all 0.2s;flex-shrink:0;} .reset-link{text-align:center;margin-top:18px;color:var(--muted);font-size:0.82rem;cursor:pointer;text-decoration:underline;} .mirror-box{white-space:pre-line;line-height:1.9;font-size:0.97rem;color:var(--muted);background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:18px;padding:28px;margin:28px 0;max-height:55vh;overflow-y:auto;} .chat-wrap{display:flex;flex-direction:column;height:100vh;} .chat-header{background:rgba(255,255,255,0.06);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;} .chat-messages{flex:1;overflow-y:auto;padding:28px 20px;max-width:760px;margin:0 auto;width:100%;} .msg{display:flex;margin-bottom:20px;} .msg.user{justify-content:flex-end;} .msg.assistant{justify-content:flex-start;} .bubble{max-width:82%;padding:18px 22px;border-radius:20px;line-height:1.7;white-space:pre-wrap;font-size:0.97rem;} .bubble.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;} .bubble.assistant{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);} .chat-input-bar{background:rgba(255,255,255,0.06);border-top:1px solid var(--border);padding:16px 20px;} .chat-input-inner{max-width:760px;margin:0 auto;display:flex;gap:12px;} .chat-input{flex:1;padding:14px 18px;background:rgba(255,255,255,0.07);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;} .chat-send{padding:14px 28px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;} .chat-send:disabled{opacity:0.5;cursor:not-allowed;} @media(max-width:600px){.card{padding:28px 18px;}.brand{font-size:2.2rem;}.question-text{font-size:1.4rem;}} </style> </head> <body> <div id="root"></div> <script> const Q=[ {id:'name',s:'Basic Context',t:'text',q:'What is your name and age?',p:'e.g. Juyunta, 25',h:'Personalizes every response'}, {id:'location',s:'Basic Context',t:'text',q:'Where do you live?',p:'City, Country',h:'Location shapes opportunities'}, {id:'job',s:'Basic Context',t:'select',q:'What do you do?',o:['Student','Employee at a company','Business owner','Farmer / Agricultural','Freelancer','Between jobs','Homemaker','Retired','Other']}, {id:'industry',s:'Basic Context',t:'text',q:'What industry or field?',p:'tech, agriculture, finance',h:'Work context matters'}, {id:'work_day',s:'Basic Context',t:'textarea',q:'Describe your actual work in 1-2 sentences.',p:'What do you DO each day?',h:'Reality beyond job titles'}, {id:'proud',s:'Dreams & Pain',t:'textarea',q:'If life was working perfectly, what would you feel most proud of?',p:'Think deeply...',h:'What success means to YOU'}, {id:'tired',s:'Dreams & Pain',t:'textarea',q:'What are you most tired of struggling with?',p:'Be honest...',h:'What drains you'}, {id:'feeling',s:'Dreams & Pain',t:'textarea',q:'When you imagine success, what feeling are you actually chasing?',p:'Freedom? Security? Peace?',h:'Emotion behind the goal'}, {id:'insec',s:'Identity & Confidence',t:'multi',q:'What do you feel insecure or self-conscious about?',o:['Body / weight','Skin (acne, aging)','Hair','Teeth / smile','Height','Clothing / style','Social skills','Public speaking','Intelligence','Being boring','Voice or accent','Career vs peers','Income level','Living situation','Relationship status','Feeling behind in life','Past mistakes','Not being taken seriously','Other']}, {id:'blockers',s:'Identity & Confidence',t:'textarea',q:'Which insecurities actually hold you back?',p:'Which ones stop you?',h:'Major vs minor'}, {id:'compare',s:'Identity & Confidence',t:'textarea',q:'When you look at others, what makes you feel behind?',p:'Be specific...',h:'Who do you compare to?'}, {id:'secret',s:'Identity & Confidence',t:'textarea',q:'Something you are embarrassed about or hide? (optional)',p:'Only if you want...',h:'Private. Helps us go deeper.'}, {id:'conf_num',s:'Identity & Confidence',t:'slider',q:'How much do insecurities affect your work confidence?',min:1,max:10,sl:['1 - Not much','10 - A lot']}, {id:'if_conf',s:'Identity & Confidence',t:'textarea',q:'What would change if you felt completely confident?',p:'What would you finally do?',h:'What confidence is blocking'}, {id:'tried_fix',s:'Identity & Confidence',t:'textarea',q:'Have you tried to fix these insecurities? What happened?',p:'Past attempts...',h:'Learn from history'}, {id:'goal10',s:'Direction & Strategy',t:'text',q:'Your 5 to 10 year goal in one sentence?',p:'Be specific',h:'Your north star'}, {id:'mastering',s:'Direction & Strategy',t:'text',q:'What are you trying to master right now?',p:'Trading? Business? A skill?',h:'Focus allocation'}, {id:'horizon',s:'Direction & Strategy',t:'select',q:'Building for short-term or long-term?',o:['Short-term income (need money now)','Long-term leverage (building for future)','Both equally','Not sure yet']}, {id:'time_waste',s:'Bottlenecks',t:'text',q:'What currently wastes most of your time?',p:'Social media? Overthinking?',h:'Primary leak'}, {id:'bad_habit',s:'Bottlenecks',t:'text',q:'One habit you know is hurting your growth?',p:'Be honest',h:'Self-awareness'}, {id:'avoiding',s:'Bottlenecks',t:'textarea',q:'What are you avoiding because it scares you?',p:'Should do but do not?',h:'Fear-based resistance'}, {id:'failed',s:'Bottlenecks',t:'textarea',q:'What have you tried that failed? Why?',p:'Learn from the past...',h:'Pattern recognition'}, {id:'domino',s:'Bottlenecks',t:'textarea',q:'What problem affects multiple areas of your life?',p:'The keystone issue...',h:'Fix one, improve all'}, {id:'fin_level',s:'Resources',t:'select',q:'Financial pressure level?',o:['Comfortable - no money stress','Managing - bills covered','Stressed - month to month','Crisis - struggling to pay bills']}, {id:'capital',s:'Resources',t:'select',q:'Capital or savings access?',o:['None or very little','Under 5k USD','5k to 20k USD','20k to 50k USD','Over 50k USD','Prefer not to say']}, {id:'unique_sk',s:'Resources',t:'textarea',q:'Skills most people do not have?',p:'Languages, technical, creative...',h:'Your leverage'}, {id:'constraint',s:'Resources',t:'select',q:'Your single biggest constraint?',o:['Time','Money','Energy','Knowledge','Network or connections','Physical location','Health','Other']}, {id:'focus_hrs',s:'Resources',t:'slider',q:'Focused hours you can produce per day?',min:1,max:12,sl:['1 hr','12 hrs']}, {id:'sleep',s:'Operating System',t:'text',q:'When do you sleep and wake up?',p:'sleep 12am, wake 8am',h:'Cognitive baseline'}, {id:'screens',s:'Operating System',t:'slider',q:'Hours on screens daily?',min:0,max:16,sl:['0 hrs','16 hrs']}, {id:'style',s:'Operating System',t:'select',q:'Strict routines or flexible systems?',o:['Strict routines - exact schedule','Flexible systems - principles','Mix of both','No preference']}, {id:'decisions',s:'Operating System',t:'select',q:'When making decisions you are mostly:',o:['Analytical - logic and data','Emotional - gut feel','Intuitive - pattern recognition','Ask others for input']}, {id:'execute',s:'Operating System',t:'select',q:'You execute best when:',o:['Working alone','With an accountability partner','In competition with others','In a team or collaboration']}, {id:'identity',s:'Psychology',t:'select',q:'What part of your identity matters most?',o:['Career success','Appearance','Intelligence','Relationships','Freedom','Impact on others','Wealth','Health']}, {id:'self_talk',s:'Psychology',t:'textarea',q:'When you fail, what do you tell yourself?',p:'Your inner dialogue...',h:'Self-talk reveals everything'}, {id:'tone',s:'Psychology',t:'select',q:'What advice tone do you want?',o:['Blunt - tell me straight','Supportive - gentle','Balanced mix']}, {id:'pressure',s:'Psychology',t:'select',q:'You want the assistant to:',o:['Challenge me - push harder','Protect my energy - sustainable pace','Adapt based on situation']} ]; let ST={stage:'welcome',step:0,ans:{},msgs:[],selMulti:[]}; function save(){try{localStorage.setItem('la',JSON.stringify(ST));}catch(e){}} function load(){try{const d=localStorage.getItem('la');if(d)ST=JSON.parse(d);}catch(e){}} function g(k,f){return ST.ans[k]||f||'?';} function insecStr(){return Array.isArray(ST.ans.insec)&&ST.ans.insec.length>0?ST.ans.insec.join(', '):'not specified';} function buildProfile(){ return `USER PROFILE: Name/Age: ${g('name')} Location: ${g('location')} Occupation: ${g('job')} in ${g('industry')} Daily work: ${g('work_day')} Proud of: ${g('proud')} Tired of: ${g('tired')} Feeling chasing: ${g('feeling')} Insecurities: ${insecStr()} What blocks them: ${g('blockers')} Compares to: ${g('compare')} Work confidence: ${g('conf_num')}/10 If confident would: ${g('if_conf')} 10-year goal: ${g('goal10')} Mastering: ${g('mastering')} Strategy: ${g('horizon')} Wastes time on: ${g('time_waste')} Bad habit: ${g('bad_habit')} Avoiding: ${g('avoiding')} Past failures: ${g('failed')} Keystone problem: ${g('domino')} Financial: ${g('fin_level')} Capital: ${g('capital')} Unique skills: ${g('unique_sk')} Constraint: ${g('constraint')} Focused hours/day: ${g('focus_hrs')} Sleep/wake: ${g('sleep')} Screen time: ${g('screens')} hrs/day Style: ${g('style')} Decision style: ${g('decisions')} Executes best: ${g('execute')} Identity priority: ${g('identity')} Self-talk: ${g('self_talk')} Preferred tone: ${g('tone')} Coaching mode: ${g('pressure')}`; } function buildMirror(){ return g('name','friend')+', here is what I see about you.\n\nWHO YOU ARE\nLocation: '+g('location')+'\nWork: '+g('job')+' in '+g('industry')+'\nDaily: '+g('work_day')+'\n\nDREAMS & PAIN\nProud of: '+g('proud')+'\nTired of: '+g('tired')+'\nChasing: '+g('feeling')+'\n\nIDENTITY & CONFIDENCE\nInsecurities: '+insecStr()+'\nBlockers: '+g('blockers')+'\nIf confident: '+g('if_conf')+'\n\nDIRECTION\nGoal: '+g('goal10')+'\nMastering: '+g('mastering')+'\nStrategy: '+g('horizon')+'\n\nBOTTLENECKS\nWastes: '+g('time_waste')+'\nHabit: '+g('bad_habit')+'\nAvoiding: '+g('avoiding')+'\n\nRESOURCES\nFinancial: '+g('fin_level')+'\nSkills: '+g('unique_sk')+'\nConstraint: '+g('constraint')+'\n\nSYSTEM\nSleep: '+g('sleep')+'\nScreens: '+g('screens')+' hrs\nStyle: '+g('style')+'\n\nPSYCHOLOGY\nPriority: '+g('identity')+'\nTone: '+g('tone')+'\nMode: '+g('pressure')+'\n\n---\nI know your full story.\nEvery answer built around YOU.\nYou are not alone. Let us work.'; } function systemPrompt(){ const tone=ST.ans.tone||''; const toneRule=tone.includes('Blunt')?'Be direct, no filter.':tone.includes('Supportive')?'Be warm and encouraging.':'Be balanced.'; return 'You are a deeply personalized life assistant. You know this person completely.\n\n'+buildProfile()+'\n\nRULES:\n- Use their name. Reference their exact situation always.\n- Connect career+confidence+sleep+habits when relevant.\n- Give specific action steps, not vague motivation.\n- Call out patterns across their answers.\n- Tone rule: '+toneRule+'\n- Make them feel truly known. No generic advice.'; } async function sendMsg(userText){ ST.msgs.push({role:'user',content:userText}); render(); const res=await fetch('/api/chat',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({system:systemPrompt(),messages:ST.msgs.map(m=>({role:m.role,content:m.content}))}) }); const data=await res.json(); const reply=data.content&&data.content[0]?data.content[0].text:'Something went wrong.'; ST.msgs.push({role:'assistant',content:reply}); ST.loading=false; save(); render(); setTimeout(()=>{const el=document.getElementById('chat-end');if(el)el.scrollIntoView({behavior:'smooth'});},100); } function reset(){ if(!confirm('Delete everything?'))return; try{localStorage.removeItem('la');}catch(e){} ST={stage:'welcome',step:0,ans:{},msgs:[],selMulti:[]}; render(); } function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');} function render(){ const root=document.getElementById('root'); if(ST.stage==='welcome'){renderWelcome(root);} else if(ST.stage==='questions'){renderQuestion(root);} else if(ST.stage==='mirror'){renderMirror(root);} else{renderChat(root);} } function renderWelcome(root){ root.innerHTML=`<div class="page"><div class="card"> <div class="brand">Life Assistant</div> <p class="tagline">The companion who knows your full story</p> <div class="meta-list"> <p><strong>37 questions across 8 sections</strong></p> <p>Who you are | Dreams & pain | Identity & confidence</p> <p>Goals | Bottlenecks | Resources | System | Psychology</p><br> <p><strong>25-30 minutes.</strong> Saves automatically. AI chat at the end.</p> </div> <button class="btn-primary" id="sb">Start Your Transformation</button> </div></div>`; document.getElementById('sb').onclick=()=>{ST.stage='questions';save();render();}; } function renderQuestion(root){ const q=Q[ST.step]; const pct=Math.round(((ST.step+1)/Q.length)*100); const sv=ST.ans[q.id]; let inp=''; if(q.t==='text'){inp='<input class="field-text" id="qa" type="text" placeholder="'+q.p+'" value="'+esc(sv||'')+'">';} else if(q.t==='textarea'){inp='<textarea class="field-area" id="qa" placeholder="'+q.p+'">'+esc(sv||'')+'</textarea>';} else if(q.t==='slider'){ const v=sv||Math.round((q.min+q.max)/2); inp='<div class="slider-num" id="sn">'+v+'</div><input class="field-range" id="qa" type="range" min="'+q.min+'" max="'+q.max+'" value="'+v+'"><div class="range-labels"><span>'+q.sl[0]+'</span><span>'+q.sl[1]+'</span></div>'; } else if(q.t==='select'){inp=q.o.map((o,i)=>'<button class="opt-btn" data-i="'+i+'">'+o+'</button>').join('');} else if(q.t==='multi'){ const sel=Array.isArray(sv)?sv:[]; inp='<div>'+q.o.map((o,i)=>{ const c=sel.includes(o); return '<div class="check-row'+(c?' checked':'')+'" data-i="'+i+'">'+'<div class="check-box">'+(c?'&#10003;':'')+'</div><span>'+o+'</span></div>'; }).join('')+'</div>'; } const showNext=q.t!=='select'; root.innerHTML=`<div class="page"><div class="card"> <div class="sec-badge">${q.s}</div> <div class="prog-row"><span>${ST.step+1} of ${Q.length}</span><span>${pct}%</span></div> <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div> <div class="question-text">${q.q}</div> ${q.h?'<div class="hint-text">'+q.h+'</div>':''} ${inp} <div class="btn-row"> ${ST.step>0?'<button class="btn-back" id="bb">Back</button>':''} ${showNext?'<button class="btn-primary" id="nb">Next</button>':''} </div> <div class="reset-link" id="rb">Reset all</div> </div></div>`; if(q.t==='slider'){ const sl=document.getElementById('qa'); const sn=document.getElementById('sn'); sl.oninput=()=>sn.textContent=sl.value; } if(q.t==='select'){ document.querySelectorAll('.opt-btn').forEach(btn=>{ btn.onclick=()=>{ST.ans[q.id]=q.o[parseInt(btn.dataset.i)];advance();}; }); } if(q.t==='multi'){ document.querySelectorAll('.check-row').forEach(row=>{ row.onclick=()=>{ const val=q.o[parseInt(row.dataset.i)]; let sel=Array.isArray(ST.ans[q.id])?[...ST.ans[q.id]]:[]; if(sel.includes(val)){sel=sel.filter(x=>x!==val);}else{sel.push(val);} ST.ans[q.id]=sel; const box=row.querySelector('.check-box'); if(sel.includes(val)){row.classList.add('checked');box.innerHTML='&#10003;';} else{row.classList.remove('checked');box.innerHTML='';} }; }); } const nb=document.getElementById('nb'); if(nb){nb.onclick=()=>{const el=document.getElementById('qa');if(el)ST.ans[q.id]=el.value;advance();};} const bb=document.getElementById('bb'); if(bb){bb.onclick=()=>{ST.step--;save();render();};} document.getElementById('rb').onclick=reset; } function advance(){ save(); if(ST.step<Q.length-1){ST.step++;render();} else{ST.stage='mirror';render();} } function renderMirror(root){ root.innerHTML=`<div class="page"><div class="card"> <div class="brand" style="font-size:2.2rem">What I See About You</div> <div class="mirror-box">${buildMirror()}</div> <button class="btn-primary" id="cn">Start Chatting with Your Assistant</button> <div class="reset-link" id="rb">Start over</div> </div></div>`; document.getElementById('cn').onclick=()=>{ ST.stage='chat'; ST.msgs=[{role:'assistant',content:(ST.ans.name||'Hey')+', I have read your full profile.\n\nI know your goals, your struggles, your insecurities, what is holding you back, how you think, and what you are building.\n\nAsk me anything - career, confidence, habits, relationships, money, appearance. I will give you advice built specifically for YOU.\n\nWhat do you want to work on first?'}]; save();render(); }; document.getElementById('rb').onclick=reset; } function renderChat(root){ const msgsHtml=ST.msgs.map(m=>`<div class="msg ${m.role}"><div class="bubble ${m.role}">${m.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`).join(''); root.innerHTML=`<div class="chat-wrap"> <div class="chat-header"> <div> <div style="font-family:Georgia,serif;font-size:1.4rem;color:#fff">Life Assistant</div> <div style="font-size:0.8rem;color:var(--muted)">Knows ${esc(ST.ans.name||'you')} completely</div> </div> <div class="reset-link" style="margin:0" id="rb">Reset</div> </div> <div class="chat-messages" id="cm">${msgsHtml}${ST.loading?'<div class="msg assistant"><div class="bubble assistant" style="color:var(--muted)">Thinking...</div></div>':''}<div id="chat-end"></div></div> <div class="chat-input-bar"> <div class="chat-input-inner"> <input class="chat-input" id="ci" placeholder="Ask anything..." ${ST.loading?'disabled':''}> <button class="chat-send" id="cs" ${ST.loading?'disabled':''}>Send</button> </div> </div> </div>`; const cm=document.getElementById('cm'); cm.scrollTop=cm.scrollHeight; const ci=document.getElementById('ci'); const cs=document.getElementById('cs'); function doSend(){ const txt=ci.value.trim(); if(!txt||ST.loading)return; ci.value=''; ST.loading=true; render(); sendMsg(txt); } ci.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}; cs.onclick=doSend; document.getElementById('rb').onclick=reset; } load(); render(); </script> </body> </html>
