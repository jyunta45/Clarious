  });

  var dhBtn = document.getElementById('deep-hist-btn');
  if (dhBtn) dhBtn.onclick = showDailyHistory;

  var modeShiftSwitch = document.getElementById('mode-shift-switch');
  if (modeShiftSwitch) modeShiftSwitch.onclick = function() {
    var ctx = pendingModeShiftContext || null;
    pendingModeShift = false;
    pendingModeShiftContext = null;
    modeShiftSuppressCount = 0;
    var prevId2 = ST.deepSessionId || 0;
    var prevMsgs2 = getAllMsgs().filter(function(m) { return m.mode === 'deep' && m.deepSessionId === prevId2; });
    var alreadySummarized2 = (ST.deepSessionSummaries || []).some(function(s) { return s.id === prevId2; });
    if (!alreadySummarized2 && prevMsgs2.filter(function(m){ return m.role === 'user'; }).length > 0) {
      summarizeDeepSession(prevMsgs2, prevId2);
    }
    ST.deepSessionId = prevId2 + 1;
    currentMode = 'deep';
    openingChips = null;
    openingNudge = null;
    responseNudge = null;
    deepEnteredWithContext = !!(ctx);
    save();
    playDeepAura();
    render();
    loadOpeningMessage(ctx);
  };
  var modeShiftStay = document.getElementById('mode-shift-stay');
  if (modeShiftStay) modeShiftStay.onclick = function() {
    pendingModeShift = false;
    modeShiftSuppressCount = 3;
    render();
  };

  document.querySelectorAll('.quick-btn').forEach(function(btn) {
    btn.onclick = function() {
      var txt = btn.dataset.qtext;
      if (!txt || isBusy) return;
      ST.loading = true;
      render();
      sendMsg(txt);
    };
  });

  var ciGo = document.getElementById('checkin-go');
  if (ciGo) ciGo.onclick = function(e) { if (e.target.id !== 'checkin-dismiss') doCheckin(); };
  var ciDis = document.getElementById('checkin-dismiss');
  if (ciDis) ciDis.onclick = function(e) { e.stopPropagation(); dismissCheckin(); };

  var micBtn = document.getElementById('voice-mic');
  if (micBtn) micBtn.onclick = startVoiceInput;

  document.querySelectorAll('.voice-play').forEach(function(btn) {
    btn.onclick = function() {
      var idx = parseInt(btn.dataset.vidx);
      var msgs = getActiveMsgs();
      if (msgs[idx] && msgs[idx].content) speakText(msgs[idx].content, btn);
    };
  });

  var chatLogoutBtn = document.getElementById('chat-logout-btn');
  if (chatLogoutBtn) chatLogoutBtn.onclick = doLogout;

  var realUpgradeBtn = document.getElementById('real-upgrade-btn');
  if (realUpgradeBtn) realUpgradeBtn.onclick = async function() {
    try {
      var res = await fetch('/api/stripe/create-checkout-session', { method: 'POST', credentials: 'include' });
      var data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else { alert('No checkout URL returned'); }
    } catch (err) {
      console.error(err);
      alert('Error starting checkout');
    }
  };

  var testUpgradeBtn = document.getElementById('test-upgrade-btn');
  if (testUpgradeBtn) testUpgradeBtn.onclick = async function() {
    try {
      var res = await fetch('/api/stripe/create-checkout-session', { method: 'POST', credentials: 'include' });
      var data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else { alert('No URL returned: ' + JSON.stringify(data)); }
    } catch (err) {
      console.error(err);
      alert('Error starting checkout');
    }
  };

  var openGrowthBtn = document.getElementById('open-growth');
  if (openGrowthBtn) openGrowthBtn.onclick = function() {
    var existing = document.getElementById('growth-panel');
    if (existing) { existing.remove(); return; }
    var pPanel = document.getElementById('patterns-panel');
    if (pPanel) pPanel.remove();
    var chatWrap = document.querySelector('.chat-wrap');
    if (chatWrap) chatWrap.insertAdjacentHTML('beforeend', renderGrowthPanel());
    var closeGrowth = document.getElementById('close-growth');
    if (closeGrowth) closeGrowth.onclick = function() {
      var panel = document.getElementById('growth-panel');
      if (panel) panel.remove();
    };
  };

  var openPatternsBtn = document.getElementById('open-patterns');
  if (openPatternsBtn) openPatternsBtn.onclick = function() {
    var existing = document.getElementById('patterns-panel');
    if (existing) { existing.remove(); return; }
    var gPanel = document.getElementById('growth-panel');
    if (gPanel) gPanel.remove();
    var chatWrap = document.querySelector('.chat-wrap');
    if (chatWrap) chatWrap.insertAdjacentHTML('beforeend', renderPatternsPanel());
    bindPatternsPanel();
  };

  function bindPatternsPanel() {
    var closeBtn = document.getElementById('close-patterns');
    if (closeBtn) closeBtn.onclick = function() {
      var panel = document.getElementById('patterns-panel');
      if (panel) panel.remove();
    };
    var panel = document.getElementById('patterns-panel');
    if (!panel) return;
    panel.querySelectorAll('[data-habit-id]').forEach(function(btn) {
      btn.onclick = function() {
        toggleHabit(btn.getAttribute('data-habit-id'));
        refreshPatternsPanel();
      };
    });
    panel.querySelectorAll('[data-habit-rm]').forEach(function(btn) {
      btn.onclick = function() {
        removeHabit(btn.getAttribute('data-habit-rm'));
        refreshPatternsPanel();
      };
    });
    var addBtn = document.getElementById('habit-add-btn');
    if (addBtn) addBtn.onclick = function() {
      var nameInput = document.getElementById('habit-name-input');
      var goalInput = document.getElementById('habit-goal-input');
      var name = nameInput ? nameInput.value.trim() : '';
      if (!name) return;
      var goal = goalInput ? goalInput.value.trim() : '';
      addHabit(name, goal);
      refreshPatternsPanel();
    };
    var nameInput = document.getElementById('habit-name-input');
    if (nameInput) nameInput.onkeydown = function(e) {
      if (e.key === 'Enter') { e.preventDefault(); var ab = document.getElementById('habit-add-btn'); if (ab) ab.click(); }
    };
  }

  function refreshPatternsPanel() {
    var panel = document.getElementById('patterns-panel');
    if (!panel) return;
    var chatWrap = document.querySelector('.chat-wrap');
    panel.remove();
    if (chatWrap) chatWrap.insertAdjacentHTML('beforeend', renderPatternsPanel());
    bindPatternsPanel();
  }

  if (activeMsgs.length <= 1 && !isBusy) {
    loadOpeningMessage();
  }
}

// ── Stripe success redirect handler ──────────────────────────────────────────
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('success') === 'true') {
    // Clear any cached limit state
    try { localStorage.removeItem('limitReached'); } catch(e) {}
    // Clear stuck loading flags from the persisted ST object
    try {
      var d = localStorage.getItem('la');
      if (d) {
        var saved = JSON.parse(d);
        saved.loading = false;
        saved.streaming = false;
        localStorage.setItem('la', JSON.stringify(saved));
      }
    } catch(e) {}
    // Strip the query param so reload doesn't loop
    history.replaceState(null, '', window.location.pathname);
    window.location.reload();
    return; // stop further execution until reload completes
  }
})();

load();
checkAuth();

// ── Overlay blocker diagnostic & fix ─────────────────────────────────────────
setTimeout(function() {
  // Step 1 — Detect what's sitting over the input area
  var elements = document.elementsFromPoint(
    window.innerWidth / 2,
    window.innerHeight - 50
  );
  console.log("Elements at input area:", elements);

  // Step 2 — Disable pointer-events on fixed high-z-index overlays
  var blockers = document.querySelectorAll('*');
  blockers.forEach(function(el) {
    var style = window.getComputedStyle(el);
    if (
      style.position === 'fixed' &&
      parseInt(style.zIndex) > 10 &&
      el !== document.body
    ) {
      el.style.pointerEvents = 'none';
    }
  });

  // Step 3 — Ensure the input itself is always clickable
  var input = document.querySelector('textarea, input');
  if (input) {
    input.style.pointerEvents = 'auto';
    input.style.zIndex = '9999';
  }
}, 1000);

} catch(e) {
  console.error('App error:', e);
  document.getElementById('root').innerHTML = '<div class="page"><div class="card"><div class="brand">Clarious</div><p class="tagline">Something went wrong. Please refresh.</p></div></div>';
}
</script>
